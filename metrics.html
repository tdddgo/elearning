<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MÁS · Meta Ads Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Montserrat","Segoe UI",sans-serif;background:#f7f5f0;color:#111}
    button{font-family:inherit;cursor:pointer}
    .tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:12px 18px;font-size:12px;font-weight:600;color:#555;letter-spacing:.04em;white-space:nowrap;transition:color .2s}
    .tab-btn:hover{color:#999}
    .tab-btn.active{color:#fff;border-bottom-color:#E91E8C}
    .dz{border:2px dashed #ddd;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;background:#fff;transition:all .2s}
    .dz:hover,.dz.drag{border-color:#29ABE2;background:#29ABE210}
    .dz.done{border-color:#29ABE2;border-style:solid;background:#29ABE205}
    .dz.err{border-color:#E91E8C;background:#E91E8C05}
    input[type=file]{display:none}
    .card{background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .stat{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .pill{display:inline-block;font-size:9px;font-weight:700;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.1em}
    .badge-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
    @media(max-width:600px){.grid-3{grid-template-columns:1fr!important}}
  </style>
</head>
<body>
<div id="root">
  <!-- HEADER -->
  <div style="background:#0a0a0a;padding:0 40px;position:sticky;top:0;z-index:100">
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:22px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-size:20px;font-weight:700;color:#fff;letter-spacing:.15em">MÁS</span>
        <div style="width:1px;height:28px;background:#2a2a2a"></div>
        <div>
          <div style="font-size:10px;color:#555;letter-spacing:.18em;text-transform:uppercase;font-weight:700">Meta Ads Dashboard</div>
          <div id="hstats" style="font-size:10px;color:#444;margin-top:1px"></div>
        </div>
      </div>
      <div id="hlegend" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div style="display:flex;height:3px;margin-top:18px">
      <div style="flex:1;background:#E91E8C"></div>
      <div style="flex:1;background:#29ABE2"></div>
      <div style="flex:1;background:#F7941D"></div>
    </div>
    <div id="tabs" style="display:flex;flex-wrap:nowrap;overflow-x:auto"></div>
  </div>
  <div id="page" style="padding:32px 40px;max-width:1100px"></div>
</div>

<script>
const PK="#E91E8C",BL="#29ABE2",OR="#F7941D",BK="#0a0a0a",GY="#888",LG="#e8e8e8",CR="#f7f5f0",DK="#333",WH="#fff";
const OBJ={leads:{icon:"📋",label:"Formularios/Leads",color:PK},visitas:{icon:"🌐",label:"Visitas",color:BL},clics:{icon:"🖱",label:"Clics",color:OR},otro:{icon:"📌",label:"Otro",color:GY}};
const fmt=n=>Math.round(n).toLocaleString("es-CL");
const fmtM=n=>(n/1e6).toFixed(2)+"M";
const eff=c=>c.gasto>0?c.leads/(c.gasto/1000):0;

let S={tab:"upload",data:{camps:[],sets:[],ads:[]},fs:{c:"",s:"",a:""},exp:null,of:{ov:"all",w:"all",adv:"all"}};

/* ── CSV ── */
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const hdrs=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let ch of line){if(ch==='"')inQ=!inQ;else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}
    vals.push(cur);
    const obj={};hdrs.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});return obj;
  });
}
function dObj(r){
  const ind=(r["Indicador de resultado"]||"").toLowerCase();
  const nm=(r["Nombre de la campaña"]||r["Nombre del conjunto de anuncios"]||r["Nombre del anuncio"]||"").toLowerCase();
  if(/leadgen|lead/.test(ind))return"leads";
  if(/landing|visit|destino/.test(ind))return"visitas";
  if(/click|clic/.test(ind))return"clics";
  if(/conv/.test(nm))return"leads";
  return"otro";
}
const parseCamps=rows=>rows.filter(r=>r["Nombre de la campaña"]).map(r=>({nombre:r["Nombre de la campaña"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,frecuencia:+r["Frecuencia"]||0,objetivo:dObj(r)})).filter(r=>r.gasto>0).sort((a,b)=>b.cpl-a.cpl);
const parseSets=rows=>rows.filter(r=>r["Nombre del conjunto de anuncios"]).map(r=>({nombre:r["Nombre del conjunto de anuncios"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,frecuencia:+r["Frecuencia"]||0,objetivo:dObj(r)})).filter(r=>r.gasto>0);
const parseAds=rows=>rows.filter(r=>r["Nombre del anuncio"]).map(r=>({nombre:r["Nombre del anuncio"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,conjunto:r["Nombre del conjunto de anuncios"]||"",calidad:r["Clasificación de calidad"]||"-",conversion:r["Clasificación del porcentaje de conversiones"]||"-",objetivo:dObj(r)})).filter(r=>r.gasto>0);

/* ── DOM HELPERS ── */
function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="cls")e.className=v;
    else e.setAttribute(k,v);
  });
  kids.forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(""+c):c);});
  return e;
}
function div(attrs,...kids){return el("div",attrs,...kids);}
function span(attrs,...kids){return el("span",attrs,...kids);}
function btn(attrs,...kids){return el("button",attrs,...kids);}

function statCard(label,value,sub,accent){
  const ac=accent||BK;
  return div({cls:"stat",style:{borderTop:`4px solid ${ac}`}},
    div({style:{fontSize:9,color:GY,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700,marginBottom:7}},label),
    div({style:{fontSize:20,fontWeight:700,color:ac===BK?BK:ac}},""+value),
    sub?div({style:{fontSize:9,color:GY,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},sub):null
  );
}

function pill(text,color){
  return span({cls:"pill",style:{background:color+"18",color}},text);
}

function scoreBadge(val){
  if(!val||val==="-")return span({style:{color:"#ccc",fontSize:11}},"—");
  const up=/encima|above/i.test(val),dn=/abajo|below/i.test(val);
  const col=up?BL:dn?PK:OR;
  const lbl=up?"↑ Encima":dn?(val.includes("35")?"↓ -35%":"↓ -20%"):"→ Prom.";
  return span({style:{background:col+"18",color:col,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:100,fontFamily:"monospace"}},lbl);
}

function uploadZone(label,icon,desc,key,parser){
  const wrap=el("div",{cls:"dz"+(S.fs[key]==="ok"?" done":S.fs[key]==="err"?" err":"")});
  const inp=el("input",{type:"file",accept:".csv"});
  wrap.appendChild(inp);
  wrap.appendChild(div({style:{fontSize:22,marginBottom:8}},S.fs[key]==="ok"?"✅":S.fs[key]==="err"?"❌":icon));
  wrap.appendChild(div({style:{fontSize:13,fontWeight:700,color:S.fs[key]==="ok"?BL:BK,marginBottom:5}},label));
  wrap.appendChild(div({style:{fontSize:11,color:GY,lineHeight:1.5}},S.fs[key]==="ok"?"Cargado · clic para reemplazar":desc));
  const handle=f=>{
    if(!f||!f.name.endsWith(".csv")){S.fs[key]="err";render();return;}
    const r=new FileReader();
    r.onload=e=>{try{S.data[key==="c"?"camps":key==="s"?"sets":"ads"]=parser(parseCSV(e.target.result));S.fs[key]="ok";render();}catch{S.fs[key]="err";render();}};
    r.readAsText(f);
  };
  inp.addEventListener("change",e=>handle(e.target.files[0]));
  wrap.addEventListener("dragover",e=>{e.preventDefault();wrap.classList.add("drag");});
  wrap.addEventListener("dragleave",()=>wrap.classList.remove("drag"));
  wrap.addEventListener("drop",e=>{e.preventDefault();wrap.classList.remove("drag");handle(e.dataTransfer.files[0]);});
  wrap.addEventListener("click",()=>inp.click());
  return wrap;
}

function objFilter(active,key){
  const objs=[...new Set(S.data.camps.map(c=>c.objetivo))];
  if(objs.length<=1)return null;
  const bar=div({style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}});
  const ab=btn({style:{background:active==="all"?BK:"transparent",color:active==="all"?WH:GY,border:`1.5px solid ${active==="all"?BK:LG}`,borderRadius:100,padding:"7px 16px",fontSize:12,fontWeight:600}},"Todos");
  ab.addEventListener("click",()=>{S.of[key]="all";render();});
  bar.appendChild(ab);
  objs.forEach(o=>{
    const m=OBJ[o]||OBJ.otro,act=active===o;
    const b=btn({style:{background:act?m.color:"transparent",color:act?WH:GY,border:`1.5px solid ${act?m.color:LG}`,borderRadius:100,padding:"7px 16px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}},span({style:{fontSize:13}},m.icon),m.label);
    b.addEventListener("click",()=>{S.of[key]=o;render();});
    bar.appendChild(b);
  });
  return bar;
}

function emptyState(msg){
  const wrap=div({cls:"card",style:{textAlign:"center",padding:"56px 32px"}});
  wrap.appendChild(div({style:{fontSize:36,marginBottom:14}},"📂"));
  wrap.appendChild(div({style:{fontSize:16,fontWeight:700,marginBottom:8}},"Sin datos cargados"));
  wrap.appendChild(div({style:{fontSize:14,color:GY,marginBottom:22}},msg||"Importa tus reportes de Meta Ads para ver el análisis."));
  const b=btn({style:{background:BK,color:WH,border:"none",borderRadius:8,padding:"11px 24px",fontSize:13,fontWeight:700}},"Ir a Importar →");
  b.addEventListener("click",()=>{S.tab="upload";render();});
  wrap.appendChild(b);
  return wrap;
}

function getStats(camps){
  const tG=camps.reduce((a,c)=>a+c.gasto,0);
  const tL=camps.reduce((a,c)=>a+c.leads,0);
  const avg=tL>0?tG/tL:0;
  const cwl=camps.filter(c=>c.leads>0).sort((a,b)=>a.cpl-b.cpl);
  return{tG,tL,avg,cwl,best:cwl[0],worst:cwl[cwl.length-1]};
}

/* ── TABS ── */
function renderUpload(){
  const {camps}=S.data;
  const objs=[...new Set(camps.map(c=>c.objetivo))];
  const pg=div({style:{maxWidth:820}});
  pg.appendChild(el("h2",{style:{fontSize:22,fontWeight:700,marginBottom:8}},"Importar reportes de Meta Ads"));
  pg.appendChild(el("p",{style:{fontSize:14,color:GY,lineHeight:1.7,marginBottom:24}},"Exporta los reportes desde Meta Ads Manager en CSV. El dashboard detecta automáticamente el objetivo de cada campaña y te permite filtrar por tipo."));
  const g=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:14,marginBottom:28}});
  g.appendChild(uploadZone("Campañas","📊","Vista Campañas · Exportar → CSV","c",parseCamps));
  g.appendChild(uploadZone("Conjuntos de anuncios","🗂","Vista Conjuntos · Exportar → CSV","s",parseSets));
  g.appendChild(uploadZone("Anuncios","🎨","Vista Anuncios · Exportar → CSV","a",parseAds));
  pg.appendChild(g);

  if(camps.length>0){
    const card=div({cls:"card",style:{marginBottom:18}});
    card.appendChild(div({style:{fontSize:14,fontWeight:700,marginBottom:16}},"Objetivos detectados en tus campañas"));
    const og=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:16}});
    objs.forEach(o=>{
      const m=OBJ[o]||OBJ.otro,cs=camps.filter(c=>c.objetivo===o);
      const item=div({style:{background:CR,borderRadius:12,padding:"16px",borderLeft:`4px solid ${m.color}`}});
      item.appendChild(div({style:{fontSize:18,marginBottom:6}},m.icon));
      item.appendChild(div({style:{fontSize:13,fontWeight:700,color:m.color,marginBottom:8}},m.label));
      item.appendChild(div({style:{fontSize:12,color:GY}},cs.length+" campañas"));
      item.appendChild(div({style:{fontSize:12,color:GY}},cs.reduce((a,c)=>a+c.leads,0)+" leads"));
      item.appendChild(div({style:{fontSize:12,color:GY}},"CLP "+fmt(cs.reduce((a,c)=>a+c.gasto,0))));
      og.appendChild(item);
    });
    card.appendChild(og);
    card.appendChild(div({style:{background:BL+"10",border:`1px solid ${BL}20`,borderLeft:`4px solid ${BL}`,borderRadius:10,padding:"13px 16px"}},
      div({style:{fontSize:10,color:BL,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}},"💡 Filtros por objetivo"),
      el("p",{style:{margin:0,fontSize:13,color:DK,lineHeight:1.6}},"En cada pestaña puedes filtrar por objetivo para que el CPL promedio y los rankings sean comparables entre sí.")
    ));
    pg.appendChild(card);
  }

  const allLoaded=S.fs.c==="ok"||S.fs.s==="ok"||S.fs.a==="ok";
  if(allLoaded){
    const bar=div({style:{background:BK,borderRadius:12,padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}});
    bar.appendChild(div({},div({style:{fontSize:13,fontWeight:700,color:WH}},"¡Datos cargados! Tu dashboard está listo."),div({style:{fontSize:11,color:"#555",marginTop:2}},S.data.camps.length+" campañas · "+S.data.sets.length+" conjuntos · "+S.data.ads.length+" anuncios")));
    const b=btn({style:{background:PK,color:WH,border:"none",borderRadius:8,padding:"10px 22px",fontSize:13,fontWeight:700}},"Ver Panorama →");
    b.addEventListener("click",()=>{S.tab="ov";render();});
    bar.appendChild(b);
    pg.appendChild(bar);
  }
  return pg;
}

function renderPanorama(){
  const fCamps=S.of.ov==="all"?S.data.camps:S.data.camps.filter(c=>c.objetivo===S.of.ov);
  const{tG,tL,avg,cwl,best,worst}=getStats(fCamps);
  const critW=cwl.filter(c=>c.cpl>avg*2);
  const pg=div({});
  const of=objFilter(S.of.ov,"ov");if(of)pg.appendChild(of);

  // stat cards
  const sg=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:13,marginBottom:32}});
  [[" Gasto total","CLP "+fmtM(tG),null,BK],["Total leads",""+tL,null,BL],["CPL promedio","$"+fmt(avg),null,BL],["Mejor CPL",best?"$"+fmt(best.cpl):"—",best?.nombre?.slice(0,22),BL],["Peor CPL",worst?"$"+fmt(worst.cpl):"—",worst?.nombre?.slice(0,22),PK],["Campañas críticas",""+critW.length,"CPL > 2x promedio",critW.length>0?OR:BL]].forEach(([l,v,s,ac])=>sg.appendChild(statCard(l,v,s,ac)));
  pg.appendChild(sg);

  // ranking
  const card=div({cls:"card",style:{marginBottom:20}});
  const hdr=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:12}});
  hdr.appendChild(div({},div({style:{fontSize:16,fontWeight:700}},"Ranking de campañas por CPL"),div({style:{fontSize:12,color:GY,marginTop:3}},"CPL promedio del filtro: $"+fmt(avg))));
  const leg=div({style:{display:"flex",gap:14}});
  [[PK,"Crítico"],[OR,"Atención"],[BL,"Óptimo"]].forEach(([col,lbl])=>leg.appendChild(div({style:{display:"flex",alignItems:"center",gap:6}},div({style:{width:8,height:8,borderRadius:"50%",background:col}}),span({style:{fontSize:11,color:GY,fontWeight:600}},lbl))));
  hdr.appendChild(leg);card.appendChild(hdr);
  cwl.forEach((c,i)=>{
    const col=c.cpl>avg*2?PK:c.cpl>avg*1.5?OR:c.cpl<avg*.7?BL:GY;
    const pct=cwl[cwl.length-1]?.cpl>0?(c.cpl/cwl[cwl.length-1].cpl)*100:0;
    const m=OBJ[c.objetivo]||OBJ.otro;
    const row=div({style:{display:"grid",gridTemplateColumns:"26px 18px 1fr 1fr",gap:12,alignItems:"center",marginBottom:13}});
    const nb=div({style:{width:24,height:24,borderRadius:6,background:c.cpl>avg*2?PK:c.cpl<avg*.7?BL:LG,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:c.cpl>avg*2||c.cpl<avg*.7?WH:GY}},""+( i+1));
    const ic=span({style:{fontSize:13},title:m.label},m.icon);
    const info=div({},div({style:{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.nombre),div({style:{fontSize:11,color:GY,marginTop:2}},c.leads+" leads · frec. "+c.frecuencia.toFixed(1)+"×"));
    const bw=div({style:{display:"flex",alignItems:"center",gap:12}});
    const bg=div({style:{flex:1,height:3,background:LG,borderRadius:2}});
    bg.appendChild(div({style:{width:pct+"%",height:"100%",background:col,borderRadius:2}}));
    bw.appendChild(bg);bw.appendChild(span({style:{fontSize:13,fontWeight:700,color:col,minWidth:85,textAlign:"right",fontFamily:"monospace"}},"$"+fmt(c.cpl)));
    row.appendChild(nb);row.appendChild(ic);row.appendChild(info);row.appendChild(bw);
    card.appendChild(row);
  });
  pg.appendChild(card);
  if(best)pg.appendChild(div({style:{background:BL+"10",border:`1.5px solid ${BL}25`,borderLeft:`4px solid ${BL}`,borderRadius:12,padding:"18px 22px"}},div({style:{fontSize:11,color:BL,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}},"💡 Insight"),el("p",{style:{margin:0,fontSize:14,color:DK,lineHeight:1.7}},best.nombre+" tiene el CPL más eficiente con $"+fmt(best.cpl)+"/lead"+(worst?" — "+Math.round(worst.cpl/best.cpl)+"× más eficiente que "+worst.nombre.slice(0,30):"")+".")));
  return pg;
}

function renderCreativos(){
  const{ads}=S.data;
  if(!ads.length)return emptyState("Carga el reporte de Anuncios para ver el análisis de creativos.");
  const topAds=[...ads].filter(a=>a.leads>0).sort((a,b)=>a.cpl-b.cpl).slice(0,6);
  const worstAds=[...ads].filter(a=>a.leads>0).sort((a,b)=>b.cpl-a.cpl).slice(0,5);
  const funnelAds=ads.filter(a=>/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion)&&a.leads>0);
  const pg=div({});

  // pattern callout
  const hdr=div({style:{background:BK,borderRadius:14,padding:"24px 28px",marginBottom:28,color:WH}});
  hdr.appendChild(div({style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},div({style:{display:"flex",gap:4}},div({style:{width:9,height:9,borderRadius:"50%",background:PK}}),div({style:{width:9,height:9,borderRadius:"50%",background:BL}}),div({style:{width:9,height:9,borderRadius:"50%",background:OR}})),div({style:{fontSize:11,color:"#555",fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}},"Patrón detectado · Nivel de anuncio")));
  hdr.appendChild(el("p",{style:{margin:"0 0 10px",fontSize:17,fontWeight:700}},"Los creativos atraen. Los formularios no convierten."));
  hdr.appendChild(el("p",{style:{margin:0,fontSize:13,color:"#aaa",lineHeight:1.8}},"Varios anuncios tienen Calidad «encima del promedio» pero Conversión «abajo del promedio». El problema no es el creativo — es lo que pasa después del clic."));
  pg.appendChild(hdr);

  // top creativos
  pg.appendChild(div({style:{fontSize:12,fontWeight:700,color:BL,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}},"🏆 Creativos estrella — replicar este formato"));
  const topList=div({style:{display:"flex",flexDirection:"column",gap:9,marginBottom:28}});
  topAds.forEach((a,i)=>{
    const row=div({cls:"card",style:{padding:"14px 20px",borderLeft:`4px solid ${i<2?BL:LG}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}});
    const info=div({style:{flex:1,minWidth:200}});
    const tb=div({style:{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}});
    tb.appendChild(span({style:{fontSize:13,fontWeight:700}},a.nombre.length>48?a.nombre.slice(0,48)+"…":a.nombre));
    if(i<2)tb.appendChild(pill("★ Estrella",PK));
    info.appendChild(tb);
    info.appendChild(div({style:{fontSize:11,color:GY}},a.conjunto.length>55?a.conjunto.slice(0,55)+"…":a.conjunto));
    const vl=div({style:{textAlign:"right"}});
    vl.appendChild(div({style:{fontSize:11,color:GY,fontWeight:700,textTransform:"uppercase"}},a.leads+" leads"));
    vl.appendChild(div({style:{fontSize:20,fontWeight:700,color:BL}},"$"+fmt(a.cpl)));
    row.appendChild(info);row.appendChild(vl);
    topList.appendChild(row);
  });
  pg.appendChild(topList);

  // worst
  pg.appendChild(div({style:{fontSize:12,fontWeight:700,color:PK,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}},"⚠ Creativos problemáticos — actuar ahora"));
  const wrstList=div({style:{display:"flex",flexDirection:"column",gap:9,marginBottom:28}});
  worstAds.forEach(a=>{
    const isFunnel=/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion);
    const row=div({cls:"card",style:{padding:"14px 20px",borderLeft:`4px solid ${PK}`}});
    const top=div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}});

/* ── RENDER ── */
const TABS=[{id:"upload",lbl:"📂 Importar"},{id:"ov",lbl:"Panorama"},{id:"creativos",lbl:"Creativos"},{id:"worst",lbl:"Campañas críticas"},{id:"adv",lbl:"Adv+ vs Intereses"}];

function render(){
  // header stats
  const hs=document.getElementById("hstats");
  const allLoaded=S.fs.c==="ok"||S.fs.s==="ok"||S.fs.a==="ok";
  if(allLoaded)hs.textContent=S.data.camps.length+" campañas · "+S.data.sets.length+" conjuntos · "+S.data.ads.length+" anuncios";
  else hs.textContent="";

  // legend
  const hl=document.getElementById("hlegend");hl.innerHTML="";
  if(allLoaded){
    const objs=[...new Set(S.data.camps.map(c=>c.objetivo))];
    if(objs.length>1)objs.forEach(o=>{
      const m=OBJ[o]||OBJ.otro;
      const item=div({style:{display:"flex",alignItems:"center",gap:6,background:m.color+"20",borderRadius:100,padding:"4px 12px"}});
      item.appendChild(div({style:{width:6,height:6,borderRadius:"50%",background:m.color}}));
      item.appendChild(span({style:{fontSize:10,color:m.color,fontWeight:700}},m.icon+" "+m.label+" ("+S.data.camps.filter(c=>c.objetivo===o).length+")"));
      hl.appendChild(item);
    });
  }

  // tabs
  const tabsEl=document.getElementById("tabs");tabsEl.innerHTML="";
  TABS.forEach(t=>{
    const b=document.createElement("button");
    b.className="tab-btn"+(S.tab===t.id?" active":"");
    b.textContent=t.lbl;
    b.addEventListener("click",()=>{S.tab=t.id;render();});
    tabsEl.appendChild(b);
  });

  // content
  const page=document.getElementById("page");page.innerHTML="";
  let view;
  if(S.tab==="upload")view=renderUpload();
  else if(!allLoaded)view=emptyState();
  else if(S.tab==="ov")view=renderPanorama();
  else if(S.tab==="creativos")view=renderCreativos();
  else if(S.tab==="worst")view=renderCriticas();
  else if(S.tab==="adv")view=renderAdvplus();
  if(view)page.appendChild(view);
}

render();
