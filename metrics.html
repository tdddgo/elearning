<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MÁS · Meta Ads Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Montserrat","Segoe UI",sans-serif;background:#f7f5f0;color:#111}
    button{font-family:inherit;cursor:pointer}
    .tab{background:transparent;border:none;border-bottom:3px solid transparent;padding:10px 14px;font-size:11px;font-weight:600;color:#666;letter-spacing:.04em;white-space:nowrap}
    .tab.active{color:#fff;border-bottom-color:#E91E8C}
    .dz{border:2px dashed #ddd;border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fff;transition:all .2s}
    .dz:hover,.dz.drag{border-color:#29ABE2;background:#29ABE210}
    .dz.done{border-color:#29ABE2;border-style:solid}
    .dz.err{border-color:#E91E8C}
    input[type=file]{display:none}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stat-card{background:#fff;border-radius:12px;padding:14px 13px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .alert{border-left:4px solid;border-radius:8px;padding:11px 14px;margin-bottom:8px;display:flex;gap:10px;font-size:12px;line-height:1.6}
    .alert.red{background:#E91E8C10;border-color:#E91E8C}
    .alert.orange{background:#F7941D10;border-color:#F7941D}
    .alert.blue{background:#29ABE210;border-color:#29ABE2}
    .pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.1em}
    .rec-card{background:#fff;border-radius:14px;border:1px solid #e8e8e8;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
  </style>
</head>
<body>
<div id="app">
  <div id="header" style="background:#0a0a0a;padding:0 28px;position:sticky;top:0;z-index:100">
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:14px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:18px;font-weight:700;color:#fff;letter-spacing:.12em">MÁS</span>
        <div style="width:1px;height:22px;background:#2a2a2a"></div>
        <div>
          <div style="font-size:9px;color:#555;letter-spacing:.18em;text-transform:uppercase;font-weight:700">Meta Ads Dashboard</div>
          <div id="header-stats" style="font-size:9px;color:#444;margin-top:1px"></div>
        </div>
      </div>
      <div id="obj-legend" style="display:flex;gap:5px;flex-wrap:wrap"></div>
    </div>
    <div style="display:flex;height:3px;margin-top:12px">
      <div style="flex:1;background:#E91E8C"></div><div style="flex:1;background:#29ABE2"></div><div style="flex:1;background:#F7941D"></div>
    </div>
    <div id="tabs" style="display:flex;flex-wrap:nowrap;overflow-x:auto"></div>
  </div>
  <div id="content" style="padding:24px 28px"></div>
</div>

<script>
const C = {pk:"#E91E8C",bl:"#29ABE2",or:"#F7941D",bk:"#0a0a0a",gy:"#888",lg:"#e8e8e8",cr:"#f7f5f0",dk:"#333",wh:"#fff"};
const OBJ = {
  leads:{icon:"📋",label:"Formularios/Leads",color:"#E91E8C"},
  visitas:{icon:"🌐",label:"Visitas",color:"#29ABE2"},
  clics:{icon:"🖱",label:"Clics",color:"#F7941D"},
  otro:{icon:"📌",label:"Otro",color:"#888"}
};
const fmt = n => Math.round(n).toLocaleString("es-CL");
const fmtM = n => (n/1000000).toFixed(2)+"M";
const eff = c => c.gasto>0 ? c.leads/(c.gasto/1000) : 0;

let state = {
  tab:"upload", data:{camps:[],sets:[],ads:[]},
  fs:{c:"",s:"",a:""}, expanded:null,
  objFilter:{ov:"all",w:"all"}, analSub:"resumen"
};

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const hdrs = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===','&&!inQ) {vals.push(cur);cur="";}
      else cur+=ch;
    }
    vals.push(cur);
    const obj = {}; hdrs.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();}); return obj;
  });
}

function detectObj(r) {
  const ind = (r["Indicador de resultado"]||"").toLowerCase();
  const nm = (r["Nombre de la campaña"]||r["Nombre del conjunto de anuncios"]||r["Nombre del anuncio"]||"").toLowerCase();
  if (/leadgen|lead/.test(ind)) return "leads";
  if (/landing|visit|destino/.test(ind)) return "visitas";
  if (/click|clic/.test(ind)) return "clics";
  if (/conv/.test(nm)) return "leads";
  return "otro";
}

function parseCamps(rows) {
  return rows.filter(r=>r["Nombre de la campaña"])
    .map(r=>({nombre:r["Nombre de la campaña"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,
      gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,frecuencia:+r["Frecuencia"]||0,objetivo:detectObj(r)}))
    .filter(r=>r.gasto>0).sort((a,b)=>b.cpl-a.cpl);
}
function parseSets(rows) {
  return rows.filter(r=>r["Nombre del conjunto de anuncios"])
    .map(r=>({nombre:r["Nombre del conjunto de anuncios"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,
      gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,frecuencia:+r["Frecuencia"]||0,objetivo:detectObj(r)}))
    .filter(r=>r.gasto>0);
}
function parseAds(rows) {
  return rows.filter(r=>r["Nombre del anuncio"])
    .map(r=>({nombre:r["Nombre del anuncio"],leads:+r["Resultados"]||0,cpl:+r["Costo por resultados"]||0,
      gasto:+r["Importe gastado (CLP)"]||0,alcance:+r["Alcance"]||0,
      conjunto:r["Nombre del conjunto de anuncios"]||"",
      calidad:r["Clasificación de calidad"]||"-",
      conversion:r["Clasificación del porcentaje de conversiones"]||"-",
      objetivo:detectObj(r)}))
    .filter(r=>r.gasto>0);
}

function h(tag, attrs) {
  const el = document.createElement(tag);
  const children = Array.from(arguments).slice(2);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style"&&typeof v==="object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="className") el.className = v;
    else el.setAttribute(k, v);
  });
  children.forEach(c => {
    if (c==null||c===false) return;
    el.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  });
  return el;
}

function statCard(label, value, sub, accent) {
  return h("div", {className:"stat-card", style:{borderTop:"4px solid "+(accent||"#0a0a0a")}},
    h("div", {style:{fontSize:9,color:"#888",letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700,marginBottom:6}}, label),
    h("div", {style:{fontSize:19,fontWeight:700,color:(accent&&accent!=="#0a0a0a")?accent:"#0a0a0a"}}, ""+value),
    sub ? h("div", {style:{fontSize:9,color:"#888",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}, sub) : null
  );
}

function alertEl(type, icon, msg) {
  return h("div", {className:"alert "+type},
    h("span", {style:{fontSize:14,flexShrink:0}}, icon),
    h("span", {}, msg)
  );
}

function makeObjFilter(active, filterKey) {
  const campObjs = [...new Set(state.data.camps.map(c=>c.objetivo))];
  if (campObjs.length <= 1) return null;
  const fbar = h("div",{style:{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}});
  const allBtn = h("button",{style:{background:active==="all"?"#0a0a0a":"transparent",color:active==="all"?"#fff":"#888",border:"1.5px solid "+(active==="all"?"#0a0a0a":"#e8e8e8"),borderRadius:100,padding:"5px 13px",fontSize:11,fontWeight:600}}, "Todos");
  allBtn.addEventListener("click",()=>{state.objFilter[filterKey]="all";render();});
  fbar.appendChild(allBtn);
  campObjs.forEach(o=>{
    const m=OBJ[o]||OBJ.otro; const act=active===o;
    const btn=h("button",{style:{background:act?m.color:"transparent",color:act?"#fff":"#888",border:"1.5px solid "+(act?m.color:"#e8e8e8"),borderRadius:100,padding:"5px 13px",fontSize:11,fontWeight:600}}, m.icon+" "+m.label);
    btn.addEventListener("click",()=>{state.objFilter[filterKey]=o;render();});
    fbar.appendChild(btn);
  });
  return fbar;
}

function uploadZone(label, icon, desc, key, parserFn) {
  const wrap = h("div", {className:"dz"+(state.fs[key]==="ok"?" done":state.fs[key]==="err"?" err":"")});
  const input = h("input", {type:"file", accept:".csv"});
  wrap.appendChild(input);
  wrap.appendChild(h("div", {style:{fontSize:20,marginBottom:6}}, state.fs[key]==="ok"?"✅":state.fs[key]==="err"?"❌":icon));
  wrap.appendChild(h("div", {style:{fontSize:12,fontWeight:700,color:state.fs[key]==="ok"?"#29ABE2":"#0a0a0a",marginBottom:3}}, label));
  wrap.appendChild(h("div", {style:{fontSize:11,color:"#888",lineHeight:1.4}}, state.fs[key]==="ok"?"Cargado · clic para reemplazar":desc));
  const handle = file => {
    if (!file||!file.name.endsWith(".csv")) {state.fs[key]="err";render();return;}
    const reader = new FileReader();
    reader.onload = e => {
      try {
        state.data[key==="c"?"camps":key==="s"?"sets":"ads"] = parserFn(parseCSV(e.target.result));
        state.fs[key]="ok"; render();
      } catch { state.fs[key]="err"; render(); }
    };
    reader.readAsText(file);
  };
  input.addEventListener("change", e=>handle(e.target.files[0]));
  wrap.addEventListener("dragover", e=>{e.preventDefault();wrap.classList.add("drag");});
  wrap.addEventListener("dragleave", ()=>wrap.classList.remove("drag"));
  wrap.addEventListener("drop", e=>{e.preventDefault();wrap.classList.remove("drag");handle(e.dataTransfer.files[0]);});
  wrap.addEventListener("click", ()=>input.click());
  return wrap;
}

function getStats(camps) {
  const tG=camps.reduce((a,c)=>a+c.gasto,0);
  const tL=camps.reduce((a,c)=>a+c.leads,0);
  const avg=tL>0?tG/tL:0;
  const cwl=camps.filter(c=>c.leads>0).sort((a,b)=>a.cpl-b.cpl);
  return {tG,tL,avg,cwl,best:cwl[0],worst:cwl[cwl.length-1]};
}

function emptyState() {
  const el=h("div",{className:"card",style:{textAlign:"center",padding:"48px 32px"}});
  el.appendChild(h("div",{style:{fontSize:32,marginBottom:12}},"📂"));
  el.appendChild(h("div",{style:{fontSize:16,fontWeight:700,marginBottom:8}},"Sin datos cargados"));
  el.appendChild(h("div",{style:{fontSize:13,color:"#888",marginBottom:20}},"Importa tus reportes de Meta Ads."));
  const btn=h("button",{style:{background:"#0a0a0a",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:700}},"Ir a Importar →");
  btn.addEventListener("click",()=>{state.tab="upload";render();});
  el.appendChild(btn); return el;
}

function renderUpload() {
  const div=h("div",{style:{maxWidth:780,margin:"0 auto"}});
  div.appendChild(h("h2",{style:{fontSize:19,fontWeight:700,marginBottom:7}},"Importar reportes"));
  div.appendChild(h("p",{style:{fontSize:13,color:"#888",lineHeight:1.7,marginBottom:20}},"Exporta los reportes desde Meta Ads Manager en CSV. El dashboard detecta automáticamente el objetivo de cada campaña."));
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(195px,1fr))",gap:11,marginBottom:20}});
  grid.appendChild(uploadZone("Campañas","📊","Vista Campañas → Exportar → CSV","c",parseCamps));
  grid.appendChild(uploadZone("Conjuntos","🗂","Vista Conjuntos → Exportar → CSV","s",parseSets));
  grid.appendChild(uploadZone("Anuncios","🎨","Vista Anuncios → Exportar → CSV","a",parseAds));
  div.appendChild(grid);
  const camps=state.data.camps;
  if(camps.length>0){
    const card=h("div",{className:"card",style:{marginBottom:14}});
    card.appendChild(h("div",{style:{fontSize:12,fontWeight:700,marginBottom:12}},"Objetivos detectados"));
    const og=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(165px,1fr))",gap:9}});
    [...new Set(camps.map(c=>c.objetivo))].forEach(o=>{
      const m=OBJ[o]||OBJ.otro;const cs=camps.filter(c=>c.objetivo===o);
      const item=h("div",{style:{background:"#f7f5f0",borderRadius:9,padding:"12px",borderLeft:"4px solid "+m.color}});
      item.appendChild(h("div",{style:{fontSize:14,marginBottom:4}},m.icon));
      item.appendChild(h("div",{style:{fontSize:11,fontWeight:700,color:m.color,marginBottom:5}},m.label));
      item.appendChild(h("div",{style:{fontSize:10,color:"#888"}},cs.length+" campañas · "+cs.reduce((a,c)=>a+c.leads,0)+" leads · CLP "+fmt(cs.reduce((a,c)=>a+c.gasto,0))));
      og.appendChild(item);
    });
    card.appendChild(og); div.appendChild(card);
  }
  if(state.fs.c==="ok"||state.fs.s==="ok"||state.fs.a==="ok"){
    const bar=h("div",{style:{background:"#0a0a0a",borderRadius:12,padding:"13px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}});
    bar.appendChild(h("div",{},h("div",{style:{fontSize:12,fontWeight:700,color:"#fff"}},"Datos cargados"),h("div",{style:{fontSize:10,color:"#555",marginTop:2}},state.data.camps.length+" campañas · "+state.data.sets.length+" conjuntos · "+state.data.ads.length+" anuncios")));
    const btn=h("button",{style:{background:"#E91E8C",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700}},"Ver Panorama →");
    btn.addEventListener("click",()=>{state.tab="ov";render();});
    bar.appendChild(btn); div.appendChild(bar);
  }
  return div;
}

function renderPanorama() {
  const fCamps=state.objFilter.ov==="all"?state.data.camps:state.data.camps.filter(c=>c.objetivo===state.objFilter.ov);
  const {tG,tL,avg,cwl,best,worst}=getStats(fCamps);
  const critW=cwl.filter(c=>c.cpl>avg*2);
  const div=h("div",{});
  const of=makeObjFilter(state.objFilter.ov,"ov");
  if(of) div.appendChild(of);
  const sg=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(135px,1fr))",gap:10,marginBottom:20}});
  [["Gasto total","CLP "+fmtM(tG),null,"#0a0a0a"],["Total leads",tL,null,"#29ABE2"],["CPL promedio","$"+fmt(avg),null,"#29ABE2"],
   ["Mejor CPL",best?"$"+fmt(best.cpl):"—",best?.nombre?.slice(0,20),"#29ABE2"],
   ["Peor CPL",worst?"$"+fmt(worst.cpl):"—",worst?.nombre?.slice(0,20),"#E91E8C"],
   ["Campañas críticas",critW.length,"CPL > 2x promedio",critW.length>0?"#F7941D":"#29ABE2"]
  ].forEach(([l,v,s,ac])=>sg.appendChild(statCard(l,v,s,ac)));
  div.appendChild(sg);
  const card=h("div",{className:"card",style:{marginBottom:14}});
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}});
  hdr.appendChild(h("div",{},h("div",{style:{fontSize:13,fontWeight:700}},"Ranking por CPL"),h("div",{style:{fontSize:11,color:"#888",marginTop:2}},"CPL promedio: $"+fmt(avg))));
  const leg=h("div",{style:{display:"flex",gap:10}});
  [["#E91E8C","Crítico"],["#F7941D","Atención"],["#29ABE2","Óptimo"]].forEach(([col,lbl])=>{
    const item=h("div",{style:{display:"flex",alignItems:"center",gap:5}});
    item.appendChild(h("div",{style:{width:7,height:7,borderRadius:"50%",background:col}}));
    item.appendChild(h("span",{style:{fontSize:10,color:"#888",fontWeight:600}},lbl));
    leg.appendChild(item);
  });
  hdr.appendChild(leg); card.appendChild(hdr);
  cwl.forEach((c,i)=>{
    const col=c.cpl>avg*2?"#E91E8C":c.cpl>avg*1.5?"#F7941D":c.cpl<avg*.7?"#29ABE2":"#888";
    const pct=cwl.length>0?(c.cpl/cwl[cwl.length-1].cpl)*100:0;
    const row=h("div",{style:{display:"grid",gridTemplateColumns:"20px 15px 1fr 1fr",gap:10,alignItems:"center",marginBottom:10}});
    const num=h("div",{style:{width:19,height:19,borderRadius:5,background:c.cpl>avg*2?"#E91E8C":c.cpl<avg*.7?"#29ABE2":"#e8e8e8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:c.cpl>avg*2||c.cpl<avg*.7?"#fff":"#888"}},""+( i+1));
    const m=OBJ[c.objetivo]||OBJ.otro;
    const info=h("div",{},h("div",{style:{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.nombre),h("div",{style:{fontSize:9,color:"#888",marginTop:1}},c.leads+" leads · frec. "+c.frecuencia.toFixed(1)+"x"));
    const bw=h("div",{style:{display:"flex",alignItems:"center",gap:8}});
    const bg=h("div",{style:{flex:1,height:3,background:"#e8e8e8",borderRadius:2}});
    bg.appendChild(h("div",{style:{width:pct+"%",height:"100%",background:col,borderRadius:2}}));
    bw.appendChild(bg);
    bw.appendChild(h("span",{style:{fontSize:12,fontWeight:700,color:col,minWidth:80,textAlign:"right",fontFamily:"monospace"}},"$"+fmt(c.cpl)));
    row.appendChild(num); row.appendChild(h("span",{style:{fontSize:12}},m.icon)); row.appendChild(info); row.appendChild(bw);
    card.appendChild(row);
  });
  div.appendChild(card);
  if(best) div.appendChild(h("div",{style:{background:"#29ABE210",border:"1.5px solid #29ABE225",borderLeft:"4px solid #29ABE2",borderRadius:10,padding:"12px 16px"}},
    h("div",{style:{fontSize:9,color:"#29ABE2",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5}},"💡 Insight"),
    h("p",{style:{margin:0,fontSize:12,color:"#333",lineHeight:1.7}},best.nombre+" es la más eficiente con $"+fmt(best.cpl)+"/lead"+(worst?" — "+Math.round(worst.cpl/best.cpl)+"x más eficiente que "+worst.nombre.slice(0,30):"")+".")
  ));
  return div;
}

function renderAnalisis() {
  const {camps,sets,ads}=state.data;
  const {tG,tL,avg,cwl,best,worst}=getStats(camps);
  const criticals=cwl.filter(c=>c.cpl>avg*2);
  const noLeads=camps.filter(c=>c.gasto>5000&&c.leads===0);
  const saturated=camps.filter(c=>c.frecuencia>4&&c.leads>0);
  const smallAud=camps.filter(c=>c.alcance>0&&c.alcance<12000&&c.leads>0);
  const funnelAds=ads.filter(a=>/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion)&&a.leads>0);
  const effRank=[...cwl].sort((a,b)=>eff(b)-eff(a));
  const maxEff=effRank.length?eff(effRank[0]):1;
  const topAds=[...ads].filter(a=>a.leads>=2).sort((a,b)=>a.cpl-b.cpl).slice(0,8);
  const worstAds=[...ads].filter(a=>a.leads>0).sort((a,b)=>b.cpl-a.cpl).slice(0,6);
  const div=h("div",{});
  const subs=[{id:"resumen",lbl:"Resumen"},{id:"eficiencia",lbl:"Eficiencia"},{id:"graficos",lbl:"Gráficos"},{id:"creativos",lbl:"Creativos"}];
  const subbar=h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}});
  subs.forEach(s=>{
    const btn=h("button",{style:{background:state.analSub===s.id?"#0a0a0a":"transparent",color:state.analSub===s.id?"#fff":"#888",border:"1.5px solid "+(state.analSub===s.id?"#0a0a0a":"#e8e8e8"),borderRadius:100,padding:"5px 13px",fontSize:11,fontWeight:600}},s.lbl);
    btn.addEventListener("click",()=>{state.analSub=s.id;render();});
    subbar.appendChild(btn);
  });
  div.appendChild(subbar);
  if(state.analSub==="resumen"){
    const sg=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(135px,1fr))",gap:10,marginBottom:18}});
    [["Gasto total","CLP "+fmtM(tG),null,"#0a0a0a"],["Total leads",tL,null,"#29ABE2"],["CPL promedio","$"+fmt(avg),null,"#29ABE2"],
     ["Mejor CPL",best?"$"+fmt(best.cpl):"—",best?.nombre?.slice(0,20),"#29ABE2"],
     ["Peor CPL",worst?"$"+fmt(worst.cpl):"—",worst?.nombre?.slice(0,20),"#E91E8C"],
     ["En riesgo",tG>0?Math.round(criticals.reduce((a,c)=>a+c.gasto,0)/tG*100)+"%":"0%","CPL > 2x promedio",criticals.length>0?"#F7941D":"#29ABE2"]
    ].forEach(([l,v,s,ac])=>sg.appendChild(statCard(l,v,s,ac)));

function render() {
  const hs=document.getElementById("header-stats");
  if(state.fs.c==="ok"||state.fs.s==="ok"||state.fs.a==="ok") hs.textContent=state.data.camps.length+" campañas · "+state.data.sets.length+" conjuntos · "+state.data.ads.length+" anuncios";
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML="";
  TABS.forEach(t=>{
    const btn=document.createElement("button");
    btn.className="tab"+(state.tab===t.id?" active":"");
    btn.textContent=t.lbl;
    btn.addEventListener("click",()=>{state.tab=t.id;render();});
    tabsEl.appendChild(btn);
  });
  const content=document.getElementById("content");
  content.innerHTML="";
  const allLoaded=state.fs.c==="ok"||state.fs.s==="ok"||state.fs.a==="ok";
  let view;
  if(state.tab==="upload") view=renderUpload();
  else if(!allLoaded) view=emptyState();
  else if(state.tab==="ov") view=renderPanorama();
  else if(state.tab==="analisis") view=renderAnalisis();
  else if(state.tab==="reco") view=renderReco();
  else if(state.tab==="worst") view=renderCriticas();
  if(view) content.appendChild(view);
}

render();
</script>
</body>
</html>
