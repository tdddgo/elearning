<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arma tu Malla · Diplomado e-learning māS UNIACC</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#F5F5F3;font-family:'Montserrat',sans-serif;color:#111;}
  button{font-family:'Montserrat',sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const LOGO = "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAQHB9ADASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAj/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/AIyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB//Z";

const COMMON = [
  { id:"c1", num:"Asignatura común · 1", title:"Neuroeducación y Aprendizaje Digital", desc:"Procesos neurobiológicos del aprendizaje en entornos virtuales. Atención, memoria, motivación y diseño cerebro-compatible.", color:"#111", tag:"Núcleo Común" },
  { id:"c2", num:"Asignatura común · 2", title:"IA Generativa para la Creación de Experiencias", desc:"Prompt Engineering avanzado, curaduría crítica de contenidos IA, marcos éticos e integridad académica.", color:"#111", tag:"Núcleo Común" },
];

const MENCIONES = [
  { id:"m1", label:"Diseño Tecnopedagógico", color:"#3AABDB", cursos:[
    { num:"Asignatura 3", title:"Producción de Recursos Multimedia y Entornos Virtuales", desc:"Herramientas de autoría (H5P, Genially), arquitectura LMS, producción audiovisual y estándares SCORM/xAPI." },
    { num:"Asignatura 4", title:"Narrativas Educativas y Storytelling Transmedia", desc:"Estructura dramática, ecosistemas transmedia, worldbuilding y escritura creativa para e-learning." },
  ]},
  { id:"m2", label:"Experiencia, Tutoría y Acompañamiento", color:"#3AABDB", cursos:[
    { num:"Asignatura 3", title:"Estrategias de Tutoría y Moderación Virtual: Comunicación y Tutoría Proactiva", desc:"Roles del e-tutor, moderación de debates, netiqueta y tutoría proactiva." },
    { num:"Asignatura 4", title:"Acompañamiento Socioemocional y Vínculo Pedagógico", desc:"Presencia social, inteligencia emocional online, comunicación empática y comunidad virtual." },
  ]},
  { id:"m3", label:"Liderazgo y Gestión de Proyectos", color:"#3AABDB", cursos:[
    { num:"Asignatura 3", title:"Dirección y Gestión de Proyectos e-learning", desc:"Ciclo de vida de programas online, presupuestos, equipos multidisciplinarios y cronogramas ágiles." },
    { num:"Asignatura 4", title:"Liderazgo y Gestión del Cambio para la Transformación Digital e Innovación Educativa", desc:"Liderazgo digital, psicología del cambio y modelos de adopción tecnológica." },
  ]},
  { id:"m4", label:"Inclusión, NEE y Diseño Universal para el Aprendizaje", color:"#3AABDB", cursos:[
    { num:"Asignatura 3", title:"Estrategias DUA y de Ajuste Curricular en Entornos Virtuales", desc:"Diseño Universal para el Aprendizaje, múltiples formas de representación y ajustes curriculares." },
    { num:"Asignatura 4", title:"Herramientas Tecnológicas para la Inclusión y la Accesibilidad Digital", desc:"Tecnologías asistivas, WCAG, lectores de pantalla y auditoría de accesibilidad digital." },
  ]},
];

const ELECTIVOS = [
  { id:"e1", title:"Evaluación en AVA: Diseño de Instrumentos y Rúbricas", desc:"Evaluación auténtica, rúbricas analíticas y feedback mediado por tecnología." },
  { id:"e2", title:"Seguimiento, Analítica de Aprendizaje y Retención", desc:"Learning Analytics, dashboards LMS y protocolos de retención basados en datos." },
  { id:"e3", title:"Aseguramiento de la Calidad y Modelos de Evaluación en E-learning", desc:"Quality Matters, OLC, criterios CNA y ciclo de mejora continua." },
  { id:"e4", title:"Neurodiversidad y Aprendizaje Flexible en Educación Online", desc:"TEA, TDAH, dislexia y estrategias para estudiantes neurodivergentes en AVA." },
];

const PINK = "#E8197A";
const BLUE = "#3AABDB";
const ORANGE = "#F57C2B";
const BLACK = "#111111";

function App() {
  const [mencion, setMencion] = useState(null);
  const [electivo, setElectivo] = useState(null);

  const plan = [
    ...COMMON,
    ...(mencion ? mencion.cursos.map((c,i) => ({ ...c, id:mencion.id+i, color:BLUE, tag:"Mención · "+mencion.label })) : []),
    ...(electivo ? [{ ...electivo, id:"el", num:"Asignatura 5", color:ORANGE, tag:"Electivo" }] : []),
  ];
  const complete = mencion && electivo;

  return (
    <div style={{minHeight:"100vh", background:"#F5F5F3"}}>

      {/* Header */}
      <div style={{background:"#111", padding:"28px 32px 24px", display:"flex", flexDirection:"column", alignItems:"center", gap:16}}>
        <img src={LOGO} alt="māS Educación Continua UNIACC" style={{height:40, filter:"invert(1)"}} />
        <div style={{textAlign:"center"}}>
          <div style={{display:"flex", alignItems:"center", gap:8, justifyContent:"center", marginBottom:6}}>
            <div style={{width:32,height:2,background:ORANGE}} />
            <div style={{width:32,height:2,background:BLUE}} />
            <div style={{width:32,height:2,background:PINK}} />
          </div>
          <h1 style={{color:"#fff", fontSize:"clamp(22px,4vw,34px)", fontWeight:900, letterSpacing:"-0.02em", margin:0}}>Arma tu Malla</h1>
          <p style={{color:"rgba(255,255,255,0.5)", fontSize:13, marginTop:8, fontWeight:400, lineHeight:1.6}}>
            Diplomado en e-learning · Elige tu mención y un electivo
          </p>
        </div>
      </div>

      <div style={{maxWidth:860, margin:"0 auto", padding:"0 16px 60px"}}>

        {/* Paso 1 */}
        <div style={{marginTop:36}}>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:14}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:PINK,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#fff",flexShrink:0}}>1</div>
            <div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"#999",marginBottom:1}}>Paso 1 · Obligatorio para todos</div>
              <div style={{fontSize:15,fontWeight:800,color:BLACK}}>Elige tu Mención</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10}}>
            {MENCIONES.map(m => {
              const sel = mencion?.id===m.id;
              return (
                <button key={m.id} onClick={() => setMencion(m)} style={{
                  background: sel ? BLACK : "#fff",
                  border: `2px solid ${sel ? BLACK : "#E0E0E0"}`,
                  borderRadius:12, padding:"16px 14px", cursor:"pointer",
                  color: sel ? "#fff" : BLACK,
                  textAlign:"left", fontSize:12, fontWeight: sel ? 700 : 500,
                  lineHeight:1.45, transition:"all 0.15s",
                  boxShadow: sel ? "0 4px 16px rgba(0,0,0,0.18)" : "0 1px 4px rgba(0,0,0,0.06)",
                }}>
                  {sel && <div style={{width:16,height:16,borderRadius:"50%",background:PINK,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,marginBottom:6}}>✓</div>}
                  {!sel && <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid #ddd",marginBottom:6}} />}
                  <div>{m.label}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Paso 2 */}
        <div style={{marginTop:30}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:ORANGE,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#fff",flexShrink:0}}>2</div>
            <div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"#999",marginBottom:1}}>Paso 2 · Elige 1 de 4</div>
              <div style={{fontSize:15,fontWeight:800,color:BLACK}}>Elige tu Electivo</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10}}>
            {ELECTIVOS.map(e => {
              const sel = electivo?.id===e.id;
              return (
                <button key={e.id} onClick={() => setElectivo(e)} style={{
                  background: sel ? ORANGE : "#fff",
                  border: `2px solid ${sel ? ORANGE : "#E0E0E0"}`,
                  borderRadius:12, padding:"16px 14px", cursor:"pointer",
                  color: sel ? "#fff" : BLACK,
                  textAlign:"left", fontSize:12, fontWeight: sel ? 700 : 500,
                  lineHeight:1.45, transition:"all 0.15s",
                  boxShadow: sel ? "0 4px 16px rgba(245,124,43,0.25)" : "0 1px 4px rgba(0,0,0,0.06)",
                }}>
                  {sel && <div style={{width:16,height:16,borderRadius:"50%",background:"rgba(255,255,255,0.3)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,marginBottom:6}}>✓</div>}
                  {!sel && <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid #ddd",marginBottom:6}} />}
                  <div>{e.title}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Separador */}
        <div style={{display:"flex",alignItems:"center",gap:16,margin:"36px 0 28px"}}>
          <div style={{flex:1,height:1,background:"#E0E0E0"}} />
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"#bbb"}}>Tu Plan de Estudios</div>
          <div style={{flex:1,height:1,background:"#E0E0E0"}} />
          {complete && <div style={{background:PINK,borderRadius:100,padding:"3px 12px",fontSize:10,fontWeight:800,color:"#fff",whiteSpace:"nowrap"}}>✓ COMPLETO</div>}
        </div>

        {/* Timeline */}
        <div style={{background:"#fff",borderRadius:20,border:"1px solid #E8E8E8",padding:"24px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>

          {/* Leyenda */}
          <div style={{display:"flex",gap:16,marginBottom:22,flexWrap:"wrap"}}>
            {[["Núcleo Común",BLACK],["Mención",BLUE],["Electivo",ORANGE]].map(([l,c]) => (
              <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,fontWeight:600,color:"#777",textTransform:"uppercase",letterSpacing:"0.08em"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:c}} />{l}
              </div>
            ))}
          </div>

          {plan.map((c,i) => (
            <div key={c.id} style={{display:"flex"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:28,flexShrink:0}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:c.color,border:`3px solid ${c.color}33`,flexShrink:0,marginTop:18}} />
                {i<4 && <div style={{width:2,flex:1,background:"#E8E8E8",minHeight:14}} />}
              </div>
              <div style={{flex:1,background:c.color+"0D",border:`1.5px solid ${c.color}22`,borderLeft:`3px solid ${c.color}`,borderRadius:"0 12px 12px 0",padding:"14px 16px",marginLeft:10,marginBottom:i===plan.length-1&&plan.length===5?0:10}}>
                <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:c.color,marginBottom:4,opacity:0.8}}>{c.tag} · {c.num}</div>
                <div style={{fontSize:13,fontWeight:700,lineHeight:1.4,marginBottom:4,color:BLACK}}>{c.title}</div>
                <div style={{fontSize:11,color:"#666",lineHeight:1.6}}>{c.desc}</div>
              </div>
            </div>
          ))}

          {Array.from({length:Math.max(0,5-plan.length)}).map((_,i) => {
            const idx=plan.length+i;
            const isLast=idx===4;
            return (
              <div key={i} style={{display:"flex",opacity:0.4}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:28,flexShrink:0}}>
                  <div style={{width:14,height:14,borderRadius:"50%",border:"2px dashed #ccc",flexShrink:0,marginTop:18}} />
                  {!isLast && <div style={{width:2,flex:1,background:"#E8E8E8",minHeight:14}} />}
                </div>
                <div style={{flex:1,background:"#F9F9F9",border:"1.5px dashed #DDD",borderLeft:"3px dashed #DDD",borderRadius:"0 12px 12px 0",padding:"14px 16px",marginLeft:10,marginBottom:isLast?0:10,display:"flex",alignItems:"center",fontSize:12,color:"#AAA",fontStyle:"italic"}}>
                  {idx<4?"Selecciona tu mención →":"Selecciona tu electivo →"}
                </div>
              </div>
            );
          })}

          {complete && (
            <div style={{marginTop:20,padding:"14px 18px",background:"#FFF0F6",borderRadius:12,border:"1.5px solid "+PINK+"44",fontSize:12,color:BLACK,lineHeight:1.7}}>
              <span style={{color:PINK,fontWeight:800}}>🎓 Malla completa.</span>
              {" "}Mención en <strong>{mencion.label}</strong> · Electivo: <strong>{electivo.title}</strong>
            </div>
          )}
          {!complete && (
            <div style={{marginTop:20,padding:"12px 18px",background:"#F9F9F9",borderRadius:12,border:"1.5px dashed #DDD",fontSize:12,color:"#AAA",textAlign:"center"}}>
              {!mencion&&!electivo?"Selecciona una mención y un electivo para completar tu malla"
              :!mencion?"Selecciona una mención para continuar"
              :"Selecciona un electivo para completar tu malla"}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
