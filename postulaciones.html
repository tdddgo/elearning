<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postulaciones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #1e3fae;
    color: #fff;
    min-height: 100vh;
  }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    padding: 24px 32px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .brand { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #fff; }

  .btn-add {
    background: #f0c200; color: #1e3fae; border: none; border-radius: 10px;
    padding: 10px 22px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-add:hover { opacity: .85; }

  /* ── STATS BAR ── */
  .stats {
    display: flex; gap: 10px; padding: 16px 32px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.1);
  }

  .stat-pill {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 8px 16px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; transition: all .15s;
  }
  .stat-pill:hover, .stat-pill.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); }
  .stat-pill.active { border-color: #f0c200; }

  .stat-num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); }

  .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-sin     { background: rgba(255,255,255,0.4); }
  .dot-pos     { background: #2ecc71; }
  .dot-neg     { background: #e74c3c; }
  .dot-entrev  { background: #f0c200; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 12px 32px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.08);
  }

  .filter-btn {
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 5px 14px;
    font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .15s;
  }
  .filter-btn.active, .filter-btn:hover { background: #f0c200; color: #1e3fae; border-color: #f0c200; }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }
  .search-wrap input {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px; padding: 6px 12px 6px 32px; color: #fff; font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; outline: none; width: 180px; transition: all .15s;
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
  .search-wrap input:focus { border-color: rgba(255,255,255,0.4); width: 220px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: .5; }

  /* ── CARDS GRID ── */
  #cardGrid {
    flex: 1; padding: 24px 32px; overflow-y: auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px;
    align-content: start;
  }

  /* ── JOB CARD ── */
  .job-card {
    background: #fff; border-radius: 14px; padding: 20px;
    border-left: 4px solid #ccc; transition: box-shadow .2s, transform .15s;
    position: relative; cursor: pointer;
  }
  .job-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.18); transform: translateY(-2px); }

  .job-card.sin    { border-left-color: #bdc3d8; }
  .job-card.pos    { border-left-color: #2ecc71; }
  .job-card.neg    { border-left-color: #e74c3c; }
  .job-card.entrev { border-left-color: #f0c200; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }

  .card-company { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: #0f2170; line-height: 1.1; }
  .card-role    { font-size: 13px; color: rgba(15,33,112,0.6); margin-top: 3px; font-weight: 500; }

  .status-badge {
    flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; border-radius: 20px; padding: 4px 10px; white-space: nowrap;
  }
  .badge-sin    { background: #f0f2f8; color: #6b7db3; }
  .badge-pos    { background: #e8faf2; color: #1a8a4a; }
  .badge-neg    { background: #fdecea; color: #c0392b; }
  .badge-entrev { background: #fefce8; color: #a07800; }

  .card-meta {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;
    font-size: 11px; color: rgba(15,33,112,0.45);
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }

  .counter {
    display: inline-flex; align-items: center; gap: 5px;
    background: #eef1fb; border-radius: 6px; padding: 3px 8px;
    font-size: 12px; font-weight: 700; color: #1e3fae;
  }
  .counter.old { background: #fdecea; color: #c0392b; }
  .counter.mid { background: #fef9e7; color: #a07800; }
  .counter.fresh { background: #e8faf2; color: #1a8a4a; }

  .card-link {
    display: block; font-size: 11px; color: #1e3fae; text-decoration: none;
    margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: .7; transition: opacity .15s;
  }
  .card-link:hover { opacity: 1; text-decoration: underline; }

  .card-notes {
    font-size: 12px; color: rgba(15,33,112,0.5); line-height: 1.5;
    background: #f7f9ff; border-radius: 7px; padding: 8px 10px;
    white-space: pre-wrap; word-break: break-word;
  }

  .card-actions {
    position: absolute; top: 14px; right: 14px;
    display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
  }
  .job-card:hover .card-actions { opacity: 1; }

  .icon-btn {
    background: #f0f2f8; border: none; color: rgba(30,63,174,0.5);
    border-radius: 6px; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 11px; transition: all .15s;
  }
  .icon-btn:hover { background: #1e3fae; color: #fff; }
  .icon-btn.del:hover { background: #e74c3c; color: #fff; }

  .empty {
    grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.35);
    font-size: 14px; padding: 80px 0; letter-spacing: 1px;
  }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 18px; padding: 30px; width: 100%;
    max-width: 500px; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #0f2170; margin-bottom: 22px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(15,33,112,0.45); margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%; background: #f5f7ff; border: 1px solid rgba(30,63,174,0.15);
    border-radius: 10px; padding: 10px 13px; font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; color: #0f2170; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #1e3fae; }
  .field select option { background: #fff; color: #0f2170; }
  .field textarea { resize: vertical; min-height: 80px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-footer { display: flex; gap: 10px; margin-top: 22px; }
  .btn-cancel {
    flex: 1; background: none; border: 1px solid rgba(30,63,174,0.2); color: rgba(30,63,174,0.5);
    border-radius: 10px; padding: 11px; font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .btn-cancel:hover { border-color: #1e3fae; color: #1e3fae; }
  .btn-save {
    flex: 2; background: #1e3fae; color: #fff; border: none; border-radius: 10px;
    padding: 11px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-save:hover { opacity: .85; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="brand">Búsqueda laboral</div>
      <h1>Mis Postulaciones ✳</h1>
    </div>
    <button class="btn-add" onclick="openModal()">+ Nueva postulación</button>
  </header>

  <!-- STATS -->
  <div class="stats" id="statsBar"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('sin',this)">Sin respuesta</button>
    <button class="filter-btn" onclick="setFilter('entrev',this)">Entrevista</button>
    <button class="filter-btn" onclick="setFilter('pos',this)">Positivo</button>
    <button class="filter-btn" onclick="setFilter('neg',this)">Negativo</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar empresa..." oninput="render()">
    </div>
  </div>

  <!-- CARDS -->
  <div id="cardGrid"></div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Nueva postulación</h2>
    <div class="row-2">
      <div class="field">
        <label>Empresa</label>
        <input type="text" id="fCompany" placeholder="Ej: Google">
      </div>
      <div class="field">
        <label>Cargo</label>
        <input type="text" id="fRole" placeholder="Ej: Diseñador UX">
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Fecha de postulación</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label>Estado</label>
        <select id="fStatus">
          <option value="sin">⚪ Sin respuesta</option>
          <option value="entrev">🟡 Entrevista</option>
          <option value="pos">🟢 Positivo</option>
          <option value="neg">🔴 Negativo</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Link de la oferta</label>
      <input type="url" id="fLink" placeholder="https://...">
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea id="fNotes" placeholder="Detalles del proceso, contacto, salario, etc."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveJob()">Guardar</button>
    </div>
  </div>
</div>

<script>
let jobs = JSON.parse(localStorage.getItem('postulaciones') || '[]');
let editingId = null;
let currentFilter = 'todos';

function save() { localStorage.setItem('postulaciones', JSON.stringify(jobs)); }

function daysSince(dateStr) {
  const posted = new Date(dateStr + 'T12:00:00');
  const now = new Date();
  return Math.floor((now - posted) / (1000 * 60 * 60 * 24));
}

function counterClass(days) {
  if (days <= 7)  return 'fresh';
  if (days <= 21) return 'mid';
  return 'old';
}

function statusLabel(s) {
  return { sin:'Sin respuesta', pos:'Positivo', neg:'Negativo', entrev:'Entrevista' }[s] || s;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function renderStats() {
  const total  = jobs.length;
  const sin    = jobs.filter(j=>j.status==='sin').length;
  const pos    = jobs.filter(j=>j.status==='pos').length;
  const neg    = jobs.filter(j=>j.status==='neg').length;
  const entrev = jobs.filter(j=>j.status==='entrev').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill ${currentFilter==='todos'?'active':''}" onclick="setFilter('todos',this)">
      <div><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    </div>
    <div class="stat-pill ${currentFilter==='sin'?'active':''}" onclick="setFilter('sin',this)">
      <div class="stat-dot dot-sin"></div>
      <div><div class="stat-num">${sin}</div><div class="stat-label">Sin respuesta</div></div>
    </div>
    <div class="stat-pill ${currentFilter==='entrev'?'active':''}" onclick="setFilter('entrev',this)">
      <div class="stat-dot dot-entrev"></div>
      <div><div class="stat-num">${entrev}</div><div class="stat-label">Entrevista</div></div>
    </div>
    <div class="stat-pill ${currentFilter==='pos'?'active':''}" onclick="setFilter('pos',this)">
      <div class="stat-dot dot-pos"></div>
      <div><div class="stat-num">${pos}</div><div class="stat-label">Positivo</div></div>
    </div>
    <div class="stat-pill ${currentFilter==='neg'?'active':''}" onclick="setFilter('neg',this)">
      <div class="stat-dot dot-neg"></div>
      <div><div class="stat-num">${neg}</div><div class="stat-label">Negativo</div></div>
    </div>`;
}

function render() {
  renderStats();
  const grid = document.getElementById('cardGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();

  let filtered = currentFilter === 'todos' ? [...jobs] : jobs.filter(j => j.status === currentFilter);
  if (q) filtered = filtered.filter(j =>
    j.company.toLowerCase().includes(q) || j.role.toLowerCase().includes(q)
  );

  // Sort: entrevista first, then sin, then by date desc
  const order = { entrev:0, sin:1, pos:2, neg:3 };
  filtered.sort((a,b) => {
    if (order[a.status] !== order[b.status]) return order[a.status]-order[b.status];
    return b.date.localeCompare(a.date);
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No hay postulaciones para mostrar.<br><br><button class="btn-add" onclick="openModal()" style="font-size:13px">+ Agregar la primera</button></div>';
    return;
  }

  grid.innerHTML = filtered.map(j => {
    const days = daysSince(j.date);
    const cc   = counterClass(days);
    const d    = new Date(j.date + 'T12:00:00');
    const dateFormatted = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

    return `
    <div class="job-card ${j.status}" onclick="editJob(${j.id})">
      <div class="card-actions">
        <button class="icon-btn del" onclick="event.stopPropagation();deleteJob(${j.id})" title="Eliminar">🗑</button>
      </div>
      <div class="card-header">
        <div>
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.role}</div>
        </div>
        <span class="status-badge badge-${j.status}">${statusLabel(j.status)}</span>
      </div>
      <div class="card-meta">
        <span>📅 ${dateFormatted}</span>
        <span class="counter ${cc}">⏱ ${days === 0 ? 'Hoy' : days === 1 ? '1 día' : `${days} días`}</span>
      </div>
      ${j.link ? `<a class="card-link" href="${j.link}" target="_blank" onclick="event.stopPropagation()">🔗 ${j.link}</a>` : ''}
      ${j.notes ? `<div class="card-notes">${j.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function openModal(prefill = null) {
  editingId = prefill ? prefill.id : null;
  document.getElementById('modalTitle').textContent = editingId ? 'Editar postulación' : 'Nueva postulación';
  document.getElementById('fCompany').value = prefill?.company || '';
  document.getElementById('fRole').value    = prefill?.role    || '';
  document.getElementById('fDate').value    = prefill?.date    || new Date().toISOString().slice(0,10);
  document.getElementById('fStatus').value  = prefill?.status  || 'sin';
  document.getElementById('fLink').value    = prefill?.link    || '';
  document.getElementById('fNotes').value   = prefill?.notes   || '';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function saveJob() {
  const company = document.getElementById('fCompany').value.trim();
  const role    = document.getElementById('fRole').value.trim();
  const date    = document.getElementById('fDate').value;
  if (!company || !role || !date) { alert('Empresa, cargo y fecha son obligatorios.'); return; }

  const job = {
    id:      editingId || Date.now(),
    company, role, date,
    status:  document.getElementById('fStatus').value,
    link:    document.getElementById('fLink').value.trim(),
    notes:   document.getElementById('fNotes').value.trim(),
  };

  if (editingId) jobs = jobs.map(j => j.id === editingId ? job : j);
  else jobs.push(job);

  save(); closeModal(); render();
}

function editJob(id) {
  const j = jobs.find(j => j.id === id);
  if (j) openModal(j);
}

function deleteJob(id) {
  if (!confirm('¿Eliminar esta postulación?')) return;
  jobs = jobs.filter(j => j.id !== id);
  save(); render();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
</body>
</html>
