const ScoreBadge = ({ val }) => {
  if (!val || val === "-") return <span style={{ fontSize:11, color:"#ccc" }}>—</span>;
  const isUp = val.includes("Encima");
  const isDown = val.includes("Abajo");
  const col = isUp ? C.blue : isDown ? C.pink : C.orange;
  const bg = col + "18";
  const icon = isUp ? "↑" : isDown ? "↓" : "→";
  const label = isUp ? "Encima prom." : isDown ? (val.includes("35%") ? "Abajo -35%" : "Abajo -20%") : "Promedio";
  return <span style={{ background:bg, color:col, fontSize:10, fontWeight:700, padding:"3px 8px", borderRadius:100, fontFamily:"monospace" }}>{icon} {label}</span>;
};

const CPLBar = ({ cpl, max }) => {
  const pct = Math.min((cpl / max) * 100, 100);
  const col = cplColor(cpl);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <div style={{ flex: 1, height: 3, background: C.lightGray, borderRadius: 2 }}>
        <div style={{ width: `${pct}%`, height: "100%", background: col, borderRadius: 2 }} />
      </div>
      <span style={{ fontSize: 13, fontWeight: 700, color: col, minWidth: 80, textAlign: "right", fontFamily: "monospace" }}>
        ${cpl.toLocaleString()}
      </span>
    </div>
  );
};
