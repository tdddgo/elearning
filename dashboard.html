                            <div style={{ textAlign:"right" }}>
                              <div style={{ fontSize:10, color:C.gray, fontWeight:700, textTransform:"uppercase" }}>{ad.leads} resultados</div>
                              <div style={{ fontSize:19, fontWeight:700, color:C.blue }}>${Math.round(ad.cpl).toLocaleString("es-CL")}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div style={{ fontSize:11, fontWeight:700, color:C.pink, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:12 }}>⚠ Creativos problemáticos — peor CPR</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        {worstAds.length===0 ? <div style={{ fontSize:13, color:C.gray, padding:"16px 0" }}>No hay datos suficientes en este filtro.</div> :
                        worstAds.map((ad,i)=>{
                          const isFunnel = /encima|above/i.test(ad.calidad) && /abajo|below/i.test(ad.conversion);
                          return (
                            <div key={i} style={{ background:C.white, borderRadius:12, padding:"13px 18px", boxShadow:"0 1px 4px rgba(0,0,0,.05)", borderLeft:`4px solid ${C.pink}` }}>
                              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
                                <div style={{ flex:1, minWidth:180 }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:6, flexWrap:"wrap" }}>
                                    <span style={{ fontSize:12, fontWeight:700 }}>{ad.nombre.length>50?ad.nombre.slice(0,50)+"…":ad.nombre}</span>
                                    {isFunnel && <Pill color={C.orange}>Problema post-clic</Pill>}
                                    <span style={{ fontSize:11 }}>{(OBJ_LABELS[ad.objetivo]||OBJ_LABELS.otro).icon}</span>
                                  </div>
                                  {(ad.calidad!=="-"||ad.conversion!=="-") && (
                                    <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:4 }}>
                                      <div style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ fontSize:10, color:C.gray, fontWeight:600 }}>Calidad:</span><ScoreBadge val={ad.calidad} /></div>
                                      <div style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ fontSize:10, color:C.gray, fontWeight:600 }}>Conversión:</span><ScoreBadge val={ad.conversion} /></div>
                                    </div>
                                  )}
                                  <div style={{ fontSize:10, color:C.gray }}>{ad.conjunto.length>55?ad.conjunto.slice(0,55)+"…":ad.conjunto}</div>
                                </div>
                                <div style={{ textAlign:"right" }}>
                                  <div style={{ fontSize:10, color:C.gray, fontWeight:700, textTransform:"uppercase" }}>{ad.leads} resultados</div>
                                  <div style={{ fontSize:19, fontWeight:700, color:C.pink }}>${Math.round(ad.cpl).toLocaleString("es-CL")}</div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* ── CAMPAÑAS CRÍTICAS ── */}
            {activeTab==="worst" && (
              <div>
                {rawData.campaigns.length===0 ? <EmptyState onUpload={()=>setActiveTab("upload")} /> : (
                  <>
                    <ObjectiveFilter objectives={campObjectives} active={objFilter.worst} onChange={v=>setFilter("worst",v)} />

                    {criticalCamps.length===0 ? (
                      <div style={{ background:C.white, borderRadius:14, padding:"48px 32px", textAlign:"center", boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
                        <div style={{ fontSize:32, marginBottom:12 }}>🎉</div>
                        <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>No hay campañas críticas en este filtro</div>
                        <div style={{ fontSize:14, color:C.gray }}>Ninguna campaña supera 2× el CPR promedio.</div>
                      </div>
                    ) : (
                      <>
                        <div style={{ background:C.white, borderRadius:12, padding:"14px 20px", marginBottom:20, display:"flex", gap:22, flexWrap:"wrap", boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderLeft:`4px solid ${C.pink}` }}>
                          <div><div style={{ fontSize:9, color:C.gray, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase" }}>CPR promedio</div><div style={{ fontSize:19, fontWeight:700, color:C.black, marginTop:3 }}>${avgCPL.toLocaleString("es-CL")}</div></div>
                          <div><div style={{ fontSize:9, color:C.gray, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase" }}>Campañas críticas</div><div style={{ fontSize:19, fontWeight:700, color:C.pink, marginTop:3 }}>{criticalCamps.length}</div></div>
                          <div><div style={{ fontSize:9, color:C.gray, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase" }}>Gasto en críticas</div><div style={{ fontSize:19, fontWeight:700, color:C.pink, marginTop:3 }}>CLP {criticalCamps.reduce((a,c)=>a+c.gasto,0).toLocaleString("es-CL")}</div></div>
                        </div>

                        {criticalCamps.map((camp,idx)=>{
                          const accentCol = camp.cpl>avgCPL*4?C.pink:C.orange;
                          return (
                            <div key={idx} style={{ background:C.white, borderRadius:14, marginBottom:10, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderTop:`4px solid ${accentCol}` }}>
                              <div onClick={()=>setExpanded(expanded===idx?null:idx)} style={{ padding:"16px 22px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                                  <div style={{ background:accentCol, borderRadius:8, padding:"5px 11px" }}>
                                    <span style={{ fontSize:12, fontWeight:700, color:C.white, fontFamily:"monospace" }}>${Math.round(camp.cpl).toLocaleString("es-CL")}</span>
                                  </div>
                                  <div>
                                    <div style={{ fontSize:13, fontWeight:700 }}>{camp.nombre}</div>
                                    <div style={{ fontSize:10, color:C.gray, marginTop:2 }}>{camp.leads} resultados · frec. {camp.frecuencia.toFixed(1)}× · {(camp.cpl/avgCPL).toFixed(1)}× el promedio · {(OBJ_LABELS[camp.objetivo]||OBJ_LABELS.otro).icon} {(OBJ_LABELS[camp.objetivo]||OBJ_LABELS.otro).label}</div>
                                  </div>
                                </div>
                                <div style={{ fontSize:13, color:C.gray }}>{expanded===idx?"▲":"▼"}</div>
                              </div>
                              {expanded===idx && (
                                <div style={{ padding:"0 22px 20px", borderTop:`1px solid ${C.lightGray}` }}>
                                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))", gap:9, marginTop:16, marginBottom:16 }}>
                                    {[
                                      { label:"Resultados", value:camp.leads },
                                      { label:"Gasto CLP", value:camp.gasto.toLocaleString("es-CL") },
                                      { label:"Frecuencia", value:`${camp.frecuencia.toFixed(1)}×`, alert:camp.frecuencia>3 },
                                      { label:"CPR vs avg", value:`${(camp.cpl/avgCPL).toFixed(1)}×`, alert:true },
                                      { label:"Alcance", value:camp.alcance.toLocaleString("es-CL"), alert:camp.alcance<15000 },
                                    ].map((m,i)=>(
                                      <div key={i} style={{ background:m.alert?C.pink+"08":C.cream, border:`1px solid ${m.alert?C.pink+"25":C.lightGray}`, borderRadius:9, padding:"11px 12px" }}>
                                        <div style={{ fontSize:9, color:C.gray, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:5 }}>{m.label}</div>
                                        <div style={{ fontSize:17, fontWeight:700, color:m.alert?C.pink:C.black }}>{m.value}</div>
                                      </div>
                                    ))}
                                  </div>
                                  <div style={{ background:C.cream, borderRadius:10, padding:"13px 16px" }}>
                                    <div style={{ fontSize:10, fontWeight:700, color:C.black, marginBottom:9, letterSpacing:"0.08em", textTransform:"uppercase" }}>Acciones recomendadas</div>
                                    {[
                                      camp.frecuencia>4 && "⛔ Frecuencia crítica — renovar creativos o ampliar audiencia urgente",
                                      camp.alcance<10000 && "🗺️ Alcance muy pequeño — ampliar targeting geográfico o etario",
                                      camp.cpl>avgCPL*4 && "💰 Considerar pausar y reasignar presupuesto a campañas con CPR < promedio",
                                      "🎯 Verificar que los intereses en Adv+ están como sugerencias, no restricciones",
                                      "📝 Revisar formulario — reducir a máximo 3 campos si tiene conversión baja",
                                    ].filter(Boolean).map((a,i)=>(
                                      <div key={i} style={{ fontSize:12, color:C.darkGray, lineHeight:1.6, marginBottom:6, display:"flex", gap:7 }}>
                                        <span>{a.slice(0,2)}</span><span>{a.slice(2)}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </>
                    )}
                  </>
                )}
              </div>
            )}

            {/* ── ADV+ ── */}
            {activeTab==="advplus" && (
              <div>
                <div style={{ background:C.black, borderRadius:14, padding:"22px 26px", marginBottom:22, color:C.white }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <div style={{ display:"flex", gap:3 }}>{[C.pink,C.blue,C.orange].map((c,i)=><div key={i} style={{ width:8, height:8, borderRadius:"50%", background:c }} />)}</div>
                    <div style={{ fontSize:10, color:"#555", fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase" }}>Adv+ vs. Intereses</div>
                  </div>
                  <p style={{ margin:"0 0 6px", fontSize:16, fontWeight:700 }}>El problema no es la herramienta — es el tamaño de la audiencia.</p>
                  <p style={{ margin:0, fontSize:13, color:"#aaa", lineHeight:1.7 }}>Audiencias &gt;30k → CPR óptimo. Audiencias &lt;15k → CPR crítico. No agregues restricciones de intereses — empeoraría el problema.</p>
                </div>

                {rawData.adSets.length > 0 && (
                  <>
                    <ObjectiveFilter objectives={setsObjectives} active={objFilter.advplus} onChange={v=>setFilter("advplus",v)} />
                    <div style={{ background:C.white, borderRadius:14, padding:"22px 26px", boxShadow:"0 1px 4px rgba(0,0,0,.06)", marginBottom:20 }}>
                      <div style={{ fontSize:14, fontWeight:700, marginBottom:3 }}>Alcance vs CPR por conjunto</div>
                      <div style={{ fontSize:11, color:C.gray, marginBottom:20 }}>Barra = tamaño de audiencia · Color = nivel de CPR relativo al promedio</div>
                      {setsWithLeads.length===0 ? <div style={{ fontSize:13, color:C.gray }}>No hay conjuntos con resultados en este filtro.</div> :
                      <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                        {setsWithLeads.map((a,i)=>{
                          const maxAlc = setsWithLeads[0]?.alcance||1;
                          const setsAvgCPL = setsWithLeads.reduce((s,x)=>s+x.cpl,0)/setsWithLeads.length;
                          const pct = Math.min((a.alcance/maxAlc)*100,100);
                          const col = a.cpl>setsAvgCPL*2?C.pink:a.cpl>setsAvgCPL*1.3?C.orange:C.blue;
                          return (
                            <div key={i} style={{ display:"grid", gridTemplateColumns:"140px 1fr 90px", gap:12, alignItems:"center" }}>
                              <div style={{ fontSize:11, color:a.cpl<setsAvgCPL?C.black:C.gray, fontWeight:a.cpl<setsAvgCPL?600:400, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={a.nombre}>{a.nombre}</div>
                              <div>
                                <div style={{ height:5, background:C.cream, borderRadius:3 }}><div style={{ width:`${pct}%`, height:"100%", background:col, borderRadius:3 }} /></div>
                                <div style={{ fontSize:9, color:C.gray, marginTop:2 }}>{a.alcance.toLocaleString("es-CL")} personas</div>
                              </div>
                              <div style={{ fontSize:12, fontWeight:700, color:col, textAlign:"right", fontFamily:"monospace" }}>${Math.round(a.cpl).toLocaleString("es-CL")}</div>
                            </div>
                          );
                        })}
                      </div>}
                    </div>
                  </>
                )}

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))", gap:14 }}>
                  {[
                    { titulo:"✅ Sigue usando Adv+", color:C.blue, puntos:["Adv+ funciona bien con audiencias grandes (+30k)","No cambies lo que ya genera buen CPR","Usa el gráfico de arriba para identificar dónde hay problemas de tamaño"] },
                    { titulo:"⚙ Intereses en Adv+", color:C.orange, puntos:["Agrégalos como SUGERENCIAS, no restricciones duras","Meta puede salir de esos intereses si encuentra mejores audiencias","Úsalos para orientar el algoritmo, no para limitarlo"] },
                    { titulo:"🚫 Lo que NO hacer", color:C.pink, puntos:["No agregar restricciones a conjuntos con alcance < 15k","No segmentar por edad muy específica en nichos pequeños","No crear conjuntos sin revisar el tamaño estimado de audiencia"] },
                  ].map((card,i)=>(
                    <div key={i} style={{ background:C.white, borderRadius:12, padding:"18px", boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderTop:`4px solid ${card.color}` }}>
                      <div style={{ fontSize:13, fontWeight:700, color:card.color, marginBottom:12 }}>{card.titulo}</div>
                      {card.puntos.map((p,j)=>(
                        <div key={j} style={{ display:"flex", gap:9, alignItems:"flex-start", marginBottom:8 }}>
                          <div style={{ width:5, height:5, borderRadius:"50%", background:card.color, marginTop:6, flexShrink:0 }} />
                          <div style={{ fontSize:12, color:C.darkGray, lineHeight:1.5 }}>{p}</div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            )}


            {/* ── ANÁLISIS ── */}
            {activeTab==="chat" && (
              <div>
                {rawData.campaigns.length === 0 ? (
                  <EmptyState onUpload={()=>setActiveTab("upload")} />
                ) : (
                  <AnalisisEngine campaigns={rawData.campaigns} adSets={rawData.adSets} ads={rawData.ads} />
                )}
              </div>
            )}
            {/* ── 5 RECOMENDACIONES ── */}
            {activeTab==="recomendaciones" && (
              <div>
                {rawData.campaigns.length===0 ? <EmptyState onUpload={()=>setActiveTab("upload")} /> : (
                  <RecomendacionesEngine campaigns={rawData.campaigns} adSets={rawData.adSets} ads={rawData.ads} />
                )}
              </div>
            )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
