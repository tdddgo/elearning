<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MÁS · Meta Ads Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f7f5f0; font-family:'Montserrat',sans-serif; }
    button { font-family:inherit; cursor:pointer; }
    .drop-zone { border:2px dashed #e8e8e8; border-radius:14px; padding:32px 20px; text-align:center; transition:all 0.2s; background:#fff; cursor:pointer; }
    .drop-zone.drag { border-color:#29ABE2; background:#29ABE215; }
    .drop-zone.done { border-color:#29ABE2; border-style:solid; background:#29ABE208; }
    .drop-zone.error { border-color:#E91E8C; background:#E91E8C08; }
    input[type=file] { display:none; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:#f0f0f0; }
    ::-webkit-scrollbar-thumb { background:#ccc; border-radius:2px; }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useMemo } = React;
    const LOGO_SRC = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAQHB9ADASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAj/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/AIyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB//Z";
    const C = { black:"#0a0a0a", white:"#fff", cream:"#f7f5f0", pink:"#E91E8C", blue:"#29ABE2", orange:"#F7941D", gray:"#888", lightGray:"#e8e8e8", darkGray:"#333" };

    // ── DETECT OBJECTIVE FROM ROW ─────────────────────────────
    function detectObjective(row) {
      const ind = (row["Indicador de resultado"] || "").toLowerCase();
      const obj = (row["Objetivo de rendimiento"] || "").toLowerCase();
      const name = (row["Nombre de la campaña"] || row["Nombre del conjunto de anuncios"] || row["Nombre del anuncio"] || "").toLowerCase();
      if (ind.includes("leadgen") || ind.includes("lead") || obj.includes("lead") || obj.includes("clientes potenciales")) return "leads";
      if (ind.includes("landing") || ind.includes("visit") || obj.includes("visit") || obj.includes("destino")) return "visitas";
      if (ind.includes("click") || ind.includes("clic") || obj.includes("clic")) return "clics";
      if (name.includes("conv")) return "leads";
      return "otro";
    }

    const OBJ_LABELS = {
      leads:   { label:"Formularios / Leads", icon:"📋", color:"#E91E8C" },
      visitas: { label:"Visitas a página",    icon:"🌐", color:"#29ABE2" },
      clics:   { label:"Clics en enlace",     icon:"🖱",  color:"#F7941D" },
      otro:    { label:"Otro objetivo",       icon:"📌", color:"#888"    },
    };

    // ── PARSERS ───────────────────────────────────────────────
    function parseCampaigns(rows) {
      return rows.filter(r => r["Nombre de la campaña"])
        .map(r => ({
          nombre: r["Nombre de la campaña"],
          leads: parseFloat(r["Resultados"]) || 0,
          cpl: parseFloat(r["Costo por resultados"]) || 0,
          gasto: parseFloat(r["Importe gastado (CLP)"]) || 0,
          impresiones: parseFloat(r["Impresiones"]) || 0,
          alcance: parseFloat(r["Alcance"]) || 0,
          frecuencia: parseFloat(r["Frecuencia"]) || 0,
          estado: r["Entrega de la campaña"] || "",
          objetivo: detectObjective(r),
          indicador: r["Indicador de resultado"] || "",
        }))
        .filter(r => r.gasto > 0)
        .sort((a,b) => b.cpl - a.cpl);
    }

    function parseAdSets(rows) {
      return rows.filter(r => r["Nombre del conjunto de anuncios"])
        .map(r => ({
          nombre: r["Nombre del conjunto de anuncios"],
          leads: parseFloat(r["Resultados"]) || 0,
          cpl: parseFloat(r["Costo por resultados"]) || 0,
          gasto: parseFloat(r["Importe gastado (CLP)"]) || 0,
          alcance: parseFloat(r["Alcance"]) || 0,
          frecuencia: parseFloat(r["Frecuencia"]) || 0,
          estado: r["Entrega del conjunto de anuncios"] || "",
          objetivo: detectObjective(r),
          indicador: r["Indicador de resultado"] || "",
        }))
        .filter(r => r.gasto > 0);
    }

    function parseAds(rows) {
      return rows.filter(r => r["Nombre del anuncio"])
        .map(r => ({
          nombre: r["Nombre del anuncio"],
          leads: parseFloat(r["Resultados"]) || 0,
          cpl: parseFloat(r["Costo por resultados"]) || 0,
          gasto: parseFloat(r["Importe gastado (CLP)"]) || 0,
          alcance: parseFloat(r["Alcance"]) || 0,
          frecuencia: parseFloat(r["Frecuencia"]) || 0,
          conjunto: r["Nombre del conjunto de anuncios"] || "",
          calidad: r["Clasificación de calidad"] || "-",
          engagement: r["Clasificación del porcentaje de interacción"] || "-",
          conversion: r["Clasificación del porcentaje de conversiones"] || "-",
          estado: r["Entrega del anuncio"] || "",
          objetivo: detectObjective(r),
          indicador: r["Indicador de resultado"] || "",
        }))
        .filter(r => r.gasto > 0);
    }

    // ── SMALL COMPONENTS ─────────────────────────────────────
    const CPLBar = ({ cpl, max, avg }) => {
      const pct = Math.min((cpl / (max||1)) * 100, 100);
      const col = !avg ? C.blue : cpl > avg*3 ? C.pink : cpl > avg*1.5 ? C.orange : cpl > avg ? "#aaa" : C.blue;
      return (
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ flex:1, height:3, background:C.lightGray, borderRadius:2 }}>
            <div style={{ width:`${pct}%`, height:"100%", background:col, borderRadius:2 }} />
          </div>
          <span style={{ fontSize:13, fontWeight:700, color:col, minWidth:90, textAlign:"right", fontFamily:"monospace" }}>
            ${Math.round(cpl).toLocaleString("es-CL")}
          </span>
        </div>
      );
    };

    const ScoreBadge = ({ val }) => {
      if (!val || val==="-" || val.trim()==="") return <span style={{ color:"#ccc", fontSize:11 }}>—</span>;
      const isUp = /encima|above/i.test(val);
      const isDown = /abajo|below/i.test(val);
      const col = isUp ? C.blue : isDown ? C.pink : C.orange;
      const icon = isUp ? "↑" : isDown ? "↓" : "→";
      const label = isUp ? "Encima" : isDown ? (val.includes("35") ? "-35%" : "-20%") : "Promedio";
      return <span style={{ background:col+"18", color:col, fontSize:10, fontWeight:700, padding:"3px 8px", borderRadius:100, fontFamily:"monospace" }}>{icon} {label}</span>;
    };

    const Pill = ({ children, color }) => (
      <span style={{ background:color+"18", color, fontSize:9, fontWeight:700, letterSpacing:"0.1em", padding:"3px 9px", borderRadius:100, textTransform:"uppercase" }}>{children}</span>
    );

    const EmptyState = ({ onUpload, msg }) => (
      <div style={{ background:C.white, borderRadius:14, padding:"56px 32px", textAlign:"center", boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
        <div style={{ fontSize:36, marginBottom:14 }}>📂</div>
        <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>No hay datos cargados</div>
        <div style={{ fontSize:14, color:C.gray, marginBottom:22 }}>{msg||"Importa tus reportes de Meta Ads para ver el análisis."}</div>
        <button onClick={onUpload} style={{ background:C.black, color:C.white, border:"none", borderRadius:8, padding:"11px 24px", fontSize:13, fontWeight:700 }}>Ir a Importar →</button>
      </div>
    );

    // ── UPLOAD ZONE ───────────────────────────────────────────
    const UploadZone = ({ label, icon, description, status, onFile }) => {
      const [drag, setDrag] = useState(false);
      const ref = useRef();
      const cls = status==="ok" ? "done" : status==="error" ? "error" : drag ? "drag" : "";
      const handle = file => {
        if (!file || !file.name.endsWith(".csv")) { onFile(null,"error"); return; }
        Papa.parse(file, { header:true, skipEmptyLines:true,
          complete: res => onFile(res.data,"ok"),
          error: () => onFile(null,"error"),
        });
      };
      return (
        <div className={`drop-zone ${cls}`}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
          onClick={()=>ref.current.click()}
        >
          <input ref={ref} type="file" accept=".csv" onChange={e=>handle(e.target.files[0])} />
          <div style={{ fontSize:26, marginBottom:8 }}>{status==="ok"?"✅":status==="error"?"❌":icon}</div>
          <div style={{ fontSize:14, fontWeight:700, color:status==="ok"?C.blue:C.black, marginBottom:5 }}>{label}</div>
          <div style={{ fontSize:12, color:C.gray, lineHeight:1.5 }}>
            {status==="ok" ? "Cargado · Clic para reemplazar" : description}
          </div>
        </div>
      );
    };

    // ── OBJECTIVE FILTER BAR ──────────────────────────────────
    const ObjectiveFilter = ({ objectives, active, onChange }) => {
      if (objectives.length <= 1) return null;
      return (
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:24 }}>
          <button
            onClick={()=>onChange("all")}
            style={{ background:active==="all"?C.black:"transparent", color:active==="all"?C.white:C.gray, border:`1.5px solid ${active==="all"?C.black:C.lightGray}`, borderRadius:100, padding:"7px 16px", fontSize:12, fontWeight:600, transition:"all 0.15s" }}
          >
            Todos los objetivos
          </button>
          {objectives.map(obj => {
            const meta = OBJ_LABELS[obj] || OBJ_LABELS.otro;
            const isActive = active === obj;
            return (
              <button key={obj}
                onClick={()=>onChange(obj)}
                style={{ background:isActive?meta.color:"transparent", color:isActive?C.white:C.gray, border:`1.5px solid ${isActive?meta.color:C.lightGray}`, borderRadius:100, padding:"7px 16px", fontSize:12, fontWeight:600, transition:"all 0.15s", display:"flex", alignItems:"center", gap:6 }}
              >
                <span>{meta.icon}</span> {meta.label}
              </button>
            );
          })}
        </div>
      );
    };



    // ── RECOMENDACIONES ENGINE ───────────────────────────────
    function RecomendacionesEngine({ campaigns, adSets, ads }) {

      const totalGasto = campaigns.reduce((a,c)=>a+c.gasto,0);
      const totalLeads = campaigns.reduce((a,c)=>a+c.leads,0);
      const avgCPL = totalLeads>0 ? totalGasto/totalLeads : 0;
      const campsWithLeads = campaigns.filter(c=>c.leads>0).sort((a,b)=>a.cpl-b.cpl);
      const best = campsWithLeads[0];
      const eff = c => c.gasto>0 ? (c.leads/(c.gasto/1000)) : 0;

      // ── SCORING ENGINE: cada señal suma puntos de impacto ──
      const signals = [];

      // 1. Campañas críticas (CPL > 2x promedio) con gasto alto
      const criticals = campsWithLeads.filter(c=>c.cpl>avgCPL*2).sort((a,b)=>b.gasto-a.gasto);
      const wastedGasto = criticals.reduce((a,c)=>a+c.gasto,0);
      const extraLeads = best ? Math.round(wastedGasto*0.6/best.cpl) : 0;
      if(criticals.length>0) signals.push({
        score: wastedGasto,
        tipo: "presupuesto",
        titulo: criticals.length===1
          ? `Pausar o recortar 70% el presupuesto de "${criticals[0].nombre.slice(0,40)}"`
          : `Recortar ${criticals.length} campañas con CPL crítico (>${Math.round(avgCPL*2).toLocaleString("es-CL")} CLP)`,
        porque: `Estas campañas consumen CLP ${wastedGasto.toLocaleString("es-CL")} — el ${Math.round(wastedGasto/totalGasto*100)}% del presupuesto total — y generan solo el ${Math.round(criticals.reduce((a,c)=>a+c.leads,0)/totalLeads*100)}% de los leads. Su CPL promedio es ${Math.round(criticals.reduce((a,c)=>a+c.cpl,0)/criticals.length).toLocaleString("es-CL")} CLP, ${Math.round(criticals.reduce((a,c)=>a+c.cpl,0)/criticals.length/avgCPL)}x el promedio de la cuenta.`,
        accion: `Recortar 60–70% el presupuesto de ${criticals.map(c=>c.nombre.slice(0,25)).join(", ")}. Redirigir a ${best?.nombre?.slice(0,30)||"la campaña más eficiente"}.`,
        impacto: `~${extraLeads} leads adicionales sin aumentar el presupuesto total`,
        impactoColor: C.blue,
        campanas: criticals.slice(0,4).map(c=>({
          nombre: c.nombre.slice(0,50),
          stat: `CPL $${Math.round(c.cpl).toLocaleString("es-CL")} · gasto CLP ${c.gasto.toLocaleString("es-CL")}`,
          bad: true,
        })),
        color: C.pink, icon:"⛔",
      });

      // 2. Campañas con 0 leads
      const noLeads = campaigns.filter(c=>c.gasto>5000&&c.leads===0);
      if(noLeads.length>0) signals.push({
        score: noLeads.reduce((a,c)=>a+c.gasto,0)*1.5,
        tipo:"presupuesto",
        titulo:`Pausar ${noLeads.length} campaña${noLeads.length>1?"s":""} con gasto y cero resultados`,
        porque:`${noLeads.length===1?`"${noLeads[0].nombre.slice(0,40)}" ha`:`Estas ${noLeads.length} campañas han`} gastado CLP ${noLeads.reduce((a,c)=>a+c.gasto,0).toLocaleString("es-CL")} sin generar ningún lead. El dinero se está quemando sin retorno posible en el estado actual.`,
        accion:`Pausar inmediatamente: ${noLeads.map(c=>c.nombre.slice(0,30)).join(", ")}. Revisar configuración de píxel y evento de conversión antes de reactivar.`,
        impacto:`Recupera CLP ${noLeads.reduce((a,c)=>a+c.gasto,0).toLocaleString("es-CL")} para reasignar`,
        impactoColor: C.pink,
        campanas: noLeads.slice(0,3).map(c=>({
          nombre:c.nombre.slice(0,50),
          stat:`CLP ${c.gasto.toLocaleString("es-CL")} gastados · 0 leads`,
          bad:true,
        })),
        color:C.pink, icon:"🗑️",
      });

      // 3. Saturación (frecuencia alta)
      const saturated = campaigns.filter(c=>c.frecuencia>4&&c.leads>0).sort((a,b)=>b.frecuencia-a.frecuencia);
      if(saturated.length>0) signals.push({
        score: saturated.reduce((a,c)=>a+c.gasto,0)*0.8,
        tipo:"creativos",
        titulo:`Renovar creativos en ${saturated.length===1?`"${saturated[0].nombre.slice(0,35)}"`:`${saturated.length} campañas con frecuencia de saturación`}`,
        porque:`${saturated.length===1?"Esta campaña tiene":"Estas campañas tienen"} frecuencia ${saturated.map(c=>c.frecuencia.toFixed(1)+"x").join(", ")}. Cuando la frecuencia supera 4x, la audiencia ya vio el anuncio demasiadas veces y deja de responder — el CPL sube aunque el targeting sea correcto. El problema es el creativo, no la audiencia.`,
        accion:`Crear 2–3 creativos nuevos con propuesta de valor distinta. Mantener la segmentación actual. Objetivo: bajar frecuencia <2.5x en 2 semanas.`,
        impacto:`Puede reducir CPL entre 30–50% sin cambiar presupuesto ni audiencia`,
        impactoColor: C.orange,
        campanas: saturated.slice(0,3).map(c=>({
          nombre:c.nombre.slice(0,50),
          stat:`Frecuencia ${c.frecuencia.toFixed(1)}x · CPL $${Math.round(c.cpl).toLocaleString("es-CL")}`,
          bad:true,
        })),
        color:C.orange, icon:"🎨",
      });

      // 4. Audiencias pequeñas
      const smallAud = campaigns.filter(c=>c.alcance>0&&c.alcance<12000&&c.leads>0).sort((a,b)=>a.alcance-b.alcance);
      if(smallAud.length>0) signals.push({
        score: smallAud.reduce((a,c)=>a+c.gasto,0)*1.2,
        tipo:"audiencia",
        titulo:`Ampliar audiencia en ${smallAud.length===1?`"${smallAud[0].nombre.slice(0,35)}"`:`${smallAud.length} campañas con alcance microscópico`}`,
        porque:`Advantage+ necesita al menos 50.000 personas para optimizar correctamente. Con audiencias de ${smallAud.map(c=>c.alcance.toLocaleString("es-CL")).join(", ")} personas, el algoritmo no tiene suficiente masa para aprender y encontrar los mejores perfiles. El CPL alto es consecuencia directa del tamaño, no del creativo.`,
        accion:`Ampliar cobertura geográfica (agregar regiones), rango etario (25–55 años), y en Adv+ poner intereses como sugerencias —no restricciones— para darle libertad al algoritmo.`,
        impacto:`Con audiencia >50k, el CPL puede bajar hasta 60%`,
        impactoColor: C.orange,
        campanas: smallAud.slice(0,3).map(c=>({
          nombre:c.nombre.slice(0,50),
          stat:`Alcance ${c.alcance.toLocaleString("es-CL")} personas · CPL $${Math.round(c.cpl).toLocaleString("es-CL")}`,
          bad:true,
        })),
        color:C.orange, icon:"🗺️",
      });

      // 5. Funnel / post-click problem
      const funnelIssues = ads.filter(a=>/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion)&&a.leads>0);
      if(funnelIssues.length>0) signals.push({
        score: funnelIssues.reduce((a,x)=>a+x.gasto,0)*0.9,
        tipo:"formulario",
        titulo:`Simplificar formularios — ${funnelIssues.length} anuncio${funnelIssues.length>1?"s":""} pierden leads después del clic`,
        porque:`Meta clasifica ${funnelIssues.length===1?"este anuncio":"estos anuncios"} con calidad encima del promedio, pero con conversión abajo del promedio. Eso significa que el creativo es bueno y genera interés, pero algo en el formulario hace que la gente abandone. El cuello de botella está después del clic, no antes.`,
        accion:`Reducir el formulario a máximo 3 campos (nombre, email, teléfono). Eliminar campos opcionales. Agregar pantalla de confirmación con propuesta de valor clara. Testear landing externa vs. formulario nativo.`,
        impacto:`Formularios simples pueden duplicar la tasa de conversión post-clic`,
        impactoColor: C.blue,
        campanas: funnelIssues.slice(0,3).map(a=>({
          nombre:a.nombre.slice(0,50),
          stat:`Calidad ↑ Encima · Conversión ↓ Abajo · CPL $${Math.round(a.cpl).toLocaleString("es-CL")}`,
          bad:false,
        })),
        color:C.blue, icon:"📝",
      });

      // 6. Underinvested best campaigns
      const underinvested = campsWithLeads
        .filter(c=>c.cpl<avgCPL*0.6&&totalGasto>0&&c.gasto/totalGasto<0.1)
        .sort((a,b)=>eff(b)-eff(a));
      if(underinvested.length>0) signals.push({
        score: underinvested.reduce((a,c)=>a+(avgCPL-c.cpl)*c.leads,0)*0.7,
        tipo:"presupuesto",
        titulo:`Escalar presupuesto en ${underinvested.length===1?`"${underinvested[0].nombre.slice(0,35)}"`:`${underinvested.length} campañas subfinanciadas con CPL óptimo`}`,
        porque:`${underinvested.map(c=>c.nombre.slice(0,25)).join(", ")} tiene${underinvested.length>1?"n":""} CPL de $${underinvested.map(c=>Math.round(c.cpl).toLocaleString("es-CL")).join(", ")} — muy por debajo del promedio — pero solo recibe${underinvested.length>1?"n":""} el ${underinvested.map(c=>Math.round(c.gasto/totalGasto*100)).join(", ")}% del presupuesto. Es la campaña más eficiente y está subfinanciada.`,
        accion:`Aumentar 30–50% el presupuesto diario. Duplicar gradualmente validando que el CPL se mantiene estable. No hacer cambios bruscos — subir máximo 20% cada 3 días para no reiniciar la fase de aprendizaje de Meta.`,
        impacto:`Cada CLP adicional aquí genera ${underinvested[0]?eff(underinvested[0]).toFixed(2):"más"} leads por cada 1.000 CLP`,
        impactoColor: C.blue,
        campanas: underinvested.slice(0,2).map(c=>({
          nombre:c.nombre.slice(0,50),
          stat:`CPL $${Math.round(c.cpl).toLocaleString("es-CL")} · solo ${Math.round(c.gasto/totalGasto*100)}% del presupuesto`,
          bad:false,
        })),
        color:C.blue, icon:"🚀",
      });

      // Sort by score descending, take top 5
      const top5 = signals.sort((a,b)=>b.score-a.score).slice(0,5);

      // If less than 5, fill with generic
      const generics = [
        {
          titulo:"Activar regla automática de pausa por CPL",
          porque:"Sin reglas automáticas, una campaña puede disparar el CPL durante el fin de semana o fuera de horario sin que nadie lo note hasta el lunes. Meta permite crear reglas que pausan o notifican automáticamente.",
          accion:"En Ads Manager → Reglas automáticas → Crear regla: si CPL > [2x tu promedio] por 2 días consecutivos → pausar campaña y notificar por email.",
          impacto:"Evita que el presupuesto se queme en períodos de bajo rendimiento",
          impactoColor:C.orange, color:C.orange, icon:"🤖", campanas:[], tipo:"optimización",
        },
        {
          titulo:"Crear audiencias lookalike de tus mejores leads",
          porque:"Si tienes una base de leads pasados, Meta puede encontrar perfiles similares en toda la plataforma. Las audiencias lookalike del 1–3% son consistentemente más eficientes que los intereses estándar.",
          accion:"Subir una lista de leads históricos (mínimo 100, idealmente 500+) a Meta → Audiencias → Crear lookalike al 1%, 2% y 3% → Testear en conjuntos separados.",
          impacto:"Las lookalike suelen tener CPL 20–40% menor que audiencias de intereses",
          impactoColor:C.blue, color:C.blue, icon:"👥", campanas:[], tipo:"audiencia",
        },
        {
          titulo:"Implementar test A/B de creativos en tu mejor campaña",
          porque:"Sin datos de qué variante funciona mejor, estás tomando decisiones a ciegas. Un A/B sistemático te dice exactamente qué elemento del anuncio genera más conversiones.",
          accion:"En tu campaña con mejor CPL, duplicar el conjunto de anuncios y cambiar solo una variable (imagen, titular o CTA). Dejar correr mínimo 7 días con presupuesto igual. Pausar el perdedor.",
          impacto:"Los mejores creativos suelen tener 2–3x el rendimiento del promedio",
          impactoColor:C.blue, color:C.blue, icon:"🧪", campanas:[], tipo:"creativos",
        },
      ];

      while(top5.length < 5) top5.push(generics[top5.length-signals.length]||generics[0]);

      const tipoColors = { presupuesto:C.pink, creativos:C.orange, audiencia:C.orange, formulario:C.blue, optimización:C.orange };

      return (
        <div>
          {/* Header */}
          <div style={{ background:C.black, borderRadius:14, padding:"24px 28px", marginBottom:28, color:C.white }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <div style={{ display:"flex", gap:4 }}>{[C.pink,C.blue,C.orange].map((c,i)=><div key={i} style={{ width:9, height:9, borderRadius:"50%", background:c }} />)}</div>
              <div style={{ fontSize:10, color:"#555", fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase" }}>Prioridades detectadas automáticamente con tus datos</div>
            </div>
            <p style={{ margin:"0 0 6px", fontSize:17, fontWeight:700 }}>Las 5 acciones de mayor impacto para mejorar tus campañas</p>
            <p style={{ margin:0, fontSize:13, color:"#aaa", lineHeight:1.7 }}>Ordenadas por impacto económico estimado. Hacer las primeras 2 esta semana puede cambiar significativamente los resultados.</p>
          </div>

          {/* The 5 */}
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {top5.map((rec,i)=>(
              <div key={i} style={{ background:C.white, borderRadius:16, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,.07)", border:`1px solid ${C.lightGray}` }}>
                {/* Number + header */}
                <div style={{ display:"flex", alignItems:"stretch" }}>
                  {/* Big number */}
                  <div style={{ background:i<2?rec.color:C.cream, width:64, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <span style={{ fontSize:28, fontWeight:700, color:i<2?C.white:C.lightGray }}>{i+1}</span>
                  </div>
                  {/* Title area */}
                  <div style={{ flex:1, padding:"18px 22px", borderBottom:`1px solid ${C.lightGray}` }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                      <span style={{ fontSize:20 }}>{rec.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:15, fontWeight:700, color:C.black, lineHeight:1.4 }}>{rec.titulo}</div>
                        <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
                          {i<2 && <span style={{ background:rec.color+"18", color:rec.color, fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:100, letterSpacing:"0.08em" }}>PRIORIDAD ALTA</span>}
                          {i>=2 && <span style={{ background:"#f0f0f0", color:C.gray, fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:100 }}>ESTA SEMANA</span>}
                          <span style={{ background:(tipoColors[rec.tipo]||C.blue)+"15", color:tipoColors[rec.tipo]||C.blue, fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:100, textTransform:"uppercase" }}>{rec.tipo}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{ padding:"20px 22px 22px 22px" }}>
                  {/* Porque */}
                  <div style={{ marginBottom:16 }}>
                    <div style={{ fontSize:10, color:C.gray, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:7 }}>¿Por qué es urgente?</div>
                    <p style={{ margin:0, fontSize:13, color:C.darkGray, lineHeight:1.7 }}>{rec.porque}</p>
                  </div>

                  {/* Affected campaigns */}
                  {rec.campanas&&rec.campanas.length>0 && (
                    <div style={{ marginBottom:16 }}>
                      <div style={{ fontSize:10, color:C.gray, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:7 }}>Campañas / Anuncios afectados</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                        {rec.campanas.map((camp,j)=>(
                          <div key={j} style={{ background:C.cream, borderRadius:8, padding:"9px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                            <span style={{ fontSize:12, fontWeight:600, color:C.black }}>{camp.nombre}</span>
                            <span style={{ fontSize:11, color:camp.bad?C.pink:C.blue, fontFamily:"monospace", fontWeight:600 }}>{camp.stat}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Accion */}
                  <div style={{ background:rec.color+"08", border:`1px solid ${rec.color}25`, borderLeft:`4px solid ${rec.color}`, borderRadius:10, padding:"14px 16px", marginBottom:14 }}>
                    <div style={{ fontSize:10, color:rec.color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:6 }}>⚡ Acción concreta</div>
                    <p style={{ margin:0, fontSize:13, color:C.darkGray, lineHeight:1.7 }}>{rec.accion}</p>
                  </div>

                  {/* Impact */}
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:rec.impactoColor, flexShrink:0 }} />
                    <span style={{ fontSize:12, color:rec.impactoColor, fontWeight:700 }}>{rec.impacto}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Footer note */}
          <div style={{ background:C.blue+"10", border:`1.5px solid ${C.blue}25`, borderLeft:`4px solid ${C.blue}`, borderRadius:12, padding:"16px 20px", marginTop:24 }}>
            <div style={{ fontSize:11, color:C.blue, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>💡 Cómo usar estas recomendaciones</div>
            <p style={{ margin:0, fontSize:13, color:C.darkGray, lineHeight:1.7 }}>
              Las recomendaciones 1 y 2 son las de mayor retorno inmediato — implementarlas esta semana. Las siguientes 3 pueden hacerse en paralelo o en los próximos 7–14 días. Cada vez que cargues datos nuevos, la lista se recalcula automáticamente con tus números actualizados.
            </p>
          </div>
        </div>
      );
    }

    // ── ANÁLISIS ENGINE ──────────────────────────────────────
    function AnalisisEngine({ campaigns, adSets, ads }) {
      const [activeSection, setActiveSection] = useState("resumen");

      const totalGasto = campaigns.reduce((a,c)=>a+c.gasto,0);
      const totalLeads = campaigns.reduce((a,c)=>a+c.leads,0);
      const avgCPL = totalLeads>0 ? totalGasto/totalLeads : 0;
      const campsWithLeads = campaigns.filter(c=>c.leads>0).sort((a,b)=>a.cpl-b.cpl);
      const best = campsWithLeads[0];
      const worst = campsWithLeads[campsWithLeads.length-1];

      // Efficiency: leads per 1000 CLP
      const eff = c => c.gasto>0 ? (c.leads/(c.gasto/1000)) : 0;

      // Criticals
      const criticals = campsWithLeads.filter(c=>c.cpl>avgCPL*2);
      const wastedGasto = criticals.reduce((a,c)=>a+c.gasto,0);
      const noLeads = campaigns.filter(c=>c.gasto>0&&c.leads===0);

      // Concentration
      const sortedSpend = [...campaigns].sort((a,b)=>b.gasto-a.gasto);
      const top3pct = totalGasto>0 ? Math.round(sortedSpend.slice(0,3).reduce((a,c)=>a+c.gasto,0)/totalGasto*100) : 0;

      // Saturation
      const saturated = campaigns.filter(c=>c.frecuencia>4);
      const smallAudience = campaigns.filter(c=>c.alcance>0&&c.alcance<12000&&c.leads>0);

      // Best ad
      const topAd = [...ads].filter(a=>a.leads>=3).sort((a,b)=>a.cpl-b.cpl)[0];

      // Reallocation potential
      const savings = criticals.reduce((a,c)=>a+c.gasto*0.6,0) + noLeads.reduce((a,c)=>a+c.gasto,0);
      const extraLeads = best ? Math.round(savings/best.cpl) : 0;

      // By objective
      const byObj = {};
      campaigns.forEach(c=>{
        if(!byObj[c.objetivo]) byObj[c.objetivo]={camps:[],leads:0,gasto:0};
        byObj[c.objetivo].camps.push(c);
        byObj[c.objetivo].leads+=c.leads;
        byObj[c.objetivo].gasto+=c.gasto;
      });

      // Funnel problems in ads
      const funnelIssues = ads.filter(a=>/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion)&&a.leads>0);

      // Opportunities ranked by impact
      const opportunities = [];
      if(criticals.length>0) opportunities.push({
        titulo:`Pausar/recortar ${criticals.length} campaña${criticals.length>1?"s":""} crítica${criticals.length>1?"s":""}`,
        impacto: `Libera CLP ${Math.round(savings).toLocaleString("es-CL")} → ~${extraLeads} leads adicionales si se redirige a ${best?.nombre||"mejor campaña"}`,
        urgencia:"HOY", color:C.pink, icon:"⛔",
        detalle: criticals.map(c=>`${c.nombre}: CPL $${Math.round(c.cpl).toLocaleString("es-CL")} (${Math.round(c.cpl/avgCPL)}x el promedio), gasto CLP ${c.gasto.toLocaleString("es-CL")}`),
      });
      if(saturated.length>0) opportunities.push({
        titulo:`Renovar creativos en ${saturated.length} campaña${saturated.length>1?"s":""} saturadas`,
        impacto:`Frecuencia >4x = audiencia agotada. Creativos nuevos pueden reducir CPL hasta 40%`,
        urgencia:"ESTA SEMANA", color:C.orange, icon:"🎨",
        detalle: saturated.map(c=>`${c.nombre}: frecuencia ${c.frecuencia.toFixed(1)}x, alcance ${c.alcance.toLocaleString("es-CL")} personas`),
      });
      if(smallAudience.length>0) opportunities.push({
        titulo:`Ampliar audiencia en ${smallAudience.length} campaña${smallAudience.length>1?"s":""} con alcance microscópico`,
        impacto:`Adv+ necesita mínimo 50k personas para optimizar. Audiencias <12k generan CPL hasta 10x mayor`,
        urgencia:"ESTA SEMANA", color:C.orange, icon:"🗺️",
        detalle: smallAudience.map(c=>`${c.nombre}: solo ${c.alcance.toLocaleString("es-CL")} personas alcanzadas`),
      });
      if(funnelIssues.length>0) opportunities.push({
        titulo:`Arreglar formularios con problema post-clic`,
        impacto:`${funnelIssues.length} anuncio${funnelIssues.length>1?"s":""} con calidad alta pero conversión baja → el creativo funciona, el formulario no. Simplificar a 3 campos puede bajar CPL 30-50%`,
        urgencia:"ESTA SEMANA", color:C.blue, icon:"📝",
        detalle: funnelIssues.map(a=>`"${a.nombre.slice(0,45)}": calidad ${a.calidad} → conversión ${a.conversion}`),
      });
      if(noLeads.length>0) opportunities.push({
        titulo:`Eliminar ${noLeads.length} campaña${noLeads.length>1?"s":""} con gasto sin resultados`,
        impacto:`CLP ${noLeads.reduce((a,c)=>a+c.gasto,0).toLocaleString("es-CL")} gastados en campañas con 0 leads`,
        urgencia:"HOY", color:C.pink, icon:"🗑️",
        detalle: noLeads.map(c=>`${c.nombre}: CLP ${c.gasto.toLocaleString("es-CL")} gastados, 0 leads`),
      });

      const sections = [
        { id:"resumen", label:"Resumen ejecutivo" },
        { id:"eficiencia", label:"Eficiencia comparativa" },
        { id:"oportunidades", label:`Oportunidades (${opportunities.length})` },
        { id:"objetivos", label:"Por objetivo" },
        { id:"creativos", label:"Creativos" },
      ];

      return (
        <div>
          {/* Section nav */}
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:24 }}>
            {sections.map(s=>(
              <button key={s.id} onClick={()=>setActiveSection(s.id)}
                style={{ background:activeSection===s.id?C.black:"transparent", color:activeSection===s.id?C.white:C.gray, border:`1.5px solid ${activeSection===s.id?C.black:C.lightGray}`, borderRadius:100, padding:"7px 16px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                {s.label}
              </button>
            ))}
          </div>

          {/* ── RESUMEN EJECUTIVO ── */}
          {activeSection==="resumen" && (
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:12, marginBottom:22 }}>
                {[
                  { label:"Gasto total", value:`CLP ${(totalGasto/1000000).toFixed(2)}M`, color:C.black },
                  { label:"Total leads", value:totalLeads, color:C.blue },
                  { label:"CPL promedio", value:`$${Math.round(avgCPL).toLocaleString("es-CL")}`, color:C.blue },
                  { label:"Mejor CPL", value:`$${best?Math.round(best.cpl).toLocaleString("es-CL"):"—"}`, sub:best?.nombre?.slice(0,25), color:C.blue },
                  { label:"Peor CPL", value:`$${worst?Math.round(worst.cpl).toLocaleString("es-CL"):"—"}`, sub:worst?.nombre?.slice(0,25), color:C.pink },
                  { label:"Presupuesto en riesgo", value:`${totalGasto>0?Math.round(wastedGasto/totalGasto*100):0}%`, sub:`CLP ${Math.round(wastedGasto).toLocaleString("es-CL")}`, color:C.orange },
                  { label:"Ratio peor/mejor CPL", value:best&&worst?`${Math.round(worst.cpl/best.cpl)}x`:"—", sub:"brecha de eficiencia", color:C.pink },
                  { label:"Concentración top 3", value:`${top3pct}%`, sub:"del presupuesto", color:top3pct>60?C.orange:C.black },
                ].map((k,i)=>(
                  <div key={i} style={{ background:C.white, borderRadius:12, padding:"16px 14px", borderTop:`4px solid ${k.color}`, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
                    <div style={{ fontSize:9, color:C.gray, letterSpacing:"0.14em", textTransform:"uppercase", fontWeight:700, marginBottom:7 }}>{k.label}</div>
                    <div style={{ fontSize:20, fontWeight:700, color:k.color===C.black?C.black:k.color }}>{k.value}</div>
                    {k.sub && <div style={{ fontSize:9, color:C.gray, marginTop:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{k.sub}</div>}
                  </div>
                ))}
              </div>

              {/* Key findings */}
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {[
                  best&&worst&&worst.cpl/best.cpl>5 && { type:"alert", icon:"🚨", msg:`Brecha crítica de eficiencia: ${worst.nombre.slice(0,35)} cuesta ${Math.round(worst.cpl/best.cpl)}x más por lead que ${best.nombre.slice(0,35)}. Mismo presupuesto, resultados completamente distintos.` },
                  wastedGasto>totalGasto*0.2 && { type:"alert", icon:"💸", msg:`El ${Math.round(wastedGasto/totalGasto*100)}% del presupuesto (CLP ${Math.round(wastedGasto).toLocaleString("es-CL")}) está en campañas con CPL más de 2x el promedio. Redirigirlo a las mejores campañas generaría ~${Math.round(wastedGasto/avgCPL)} leads adicionales.` },
                  saturated.length>0 && { type:"warning", icon:"🔁", msg:`${saturated.length} campaña${saturated.length>1?"s":""} con frecuencia >4x: ${saturated.map(c=>c.nombre.slice(0,20)).join(", ")}. La audiencia ya vio el anuncio demasiadas veces — necesita creativos nuevos.` },
                  smallAudience.length>0 && { type:"warning", icon:"👥", msg:`${smallAudience.length} campaña${smallAudience.length>1?"s":""} con audiencia <12.000 personas. Adv+ no puede optimizar con tan poca masa — ampliar targeting o fusionar conjuntos.` },
                  funnelIssues.length>0 && { type:"info", icon:"📝", msg:`${funnelIssues.length} anuncio${funnelIssues.length>1?"s":""} con calidad alta pero conversión baja. El creativo funciona, el formulario no convierte — simplificar a máx 3 campos.` },
                  best && { type:"info", icon:"🏆", msg:`${best.nombre} es la campaña más eficiente con $${Math.round(best.cpl).toLocaleString("es-CL")}/lead y ${eff(best).toFixed(2)} leads por cada 1.000 CLP. Prioridad de inversión.` },
                  topAd && { type:"info", icon:"✨", msg:`Mejor anuncio: "${topAd.nombre.slice(0,45)}" con CPL $${Math.round(topAd.cpl).toLocaleString("es-CL")} — replicar este formato en campañas críticas.` },
                ].filter(Boolean).map((f,i)=>{
                  const bg = f.type==="alert"?C.pink+"10":f.type==="warning"?C.orange+"10":C.blue+"10";
                  const border = f.type==="alert"?C.pink:f.type==="warning"?C.orange:C.blue;
                  return (
                    <div key={i} style={{ background:bg, borderLeft:`4px solid ${border}`, borderRadius:10, padding:"13px 16px", display:"flex", gap:12 }}>
                      <span style={{ fontSize:16, flexShrink:0 }}>{f.icon}</span>
                      <span style={{ fontSize:13, color:C.darkGray, lineHeight:1.6 }}>{f.msg}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── EFICIENCIA COMPARATIVA ── */}
          {activeSection==="eficiencia" && (
            <div>
              <div style={{ background:C.white, borderRadius:14, padding:"24px 26px", boxShadow:"0 1px 4px rgba(0,0,0,.06)", marginBottom:18 }}>
                <div style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>Leads por cada 1.000 CLP gastados</div>
                <div style={{ fontSize:12, color:C.gray, marginBottom:22 }}>La métrica más honesta para comparar campañas de distinto tamaño · Promedio general: {(totalLeads/(totalGasto/1000)).toFixed(2)}</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {[...campaigns].filter(c=>c.leads>0).sort((a,b)=>eff(b)-eff(a)).map((c,i)=>{
                    const maxEff = eff([...campaigns].filter(x=>x.leads>0).sort((a,b)=>eff(b)-eff(a))[0]);
                    const pct = Math.min((eff(c)/maxEff)*100,100);
                    const col = eff(c)>=(totalLeads/(totalGasto/1000))*1.5?C.blue:eff(c)>=(totalLeads/(totalGasto/1000))*0.7?C.orange:C.pink;
                    const pctGasto = totalGasto>0?Math.round(c.gasto/totalGasto*100):0;
                    return (
                      <div key={i} style={{ display:"grid", gridTemplateColumns:"26px 1fr 140px 80px", gap:12, alignItems:"center" }}>
                        <div style={{ width:22, height:22, borderRadius:6, background:i===0?C.blue:i<3?C.blue+"80":C.lightGray, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:700, color:i<3?C.white:C.gray }}>{i+1}</div>
                        <div>
                          <div style={{ fontSize:12, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.nombre}</div>
                          <div style={{ display:"flex", gap:6, marginTop:3 }}>
                            <div style={{ height:4, width:`${pct}%`, background:col, borderRadius:2, minWidth:4, maxWidth:200 }} />
                          </div>
                        </div>
                        <div style={{ fontSize:11, color:C.gray, textAlign:"center" }}>
                          <span style={{ fontWeight:700, color:col, fontSize:13 }}>{eff(c).toFixed(2)}</span> leads/1k CLP
                        </div>
                        <div style={{ fontSize:11, color:C.gray, textAlign:"right" }}>
                          <div style={{ fontWeight:600 }}>{pctGasto}% budget</div>
                          <div>{c.leads} leads</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Spend vs leads bubble comparison */}
              <div style={{ background:C.white, borderRadius:14, padding:"24px 26px", boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>

    // ── MAIN APP ─────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState("upload");
      const [expanded, setExpanded] = useState(null);
      const [fileStatus, setFileStatus] = useState({ camps:"", adsets:"", ads:"" });
      const [rawData, setRawData] = useState({ campaigns:[], adSets:[], ads:[] });

      // Active objective filter per tab
      const [objFilter, setObjFilter] = useState({ overview:"all", anuncios:"all", worst:"all", advplus:"all" });

      const handleFile = (key, parser) => (rows, status) => {
        setFileStatus(s=>({...s,[key]:status}));
        if (status==="ok") {
          const parsed = parser(rows);
          const dataKey = key==="camps"?"campaigns":key==="adsets"?"adSets":"ads";
          setRawData(d=>({...d,[dataKey]:parsed}));
        }
      };

      // Unique objectives present in each dataset
      const campObjectives = useMemo(()=>[...new Set(rawData.campaigns.map(c=>c.objetivo))], [rawData.campaigns]);
      const adsObjectives  = useMemo(()=>[...new Set(rawData.ads.map(a=>a.objetivo))],       [rawData.ads]);
      const setsObjectives = useMemo(()=>[...new Set(rawData.adSets.map(a=>a.objetivo))],    [rawData.adSets]);

      // Filtered data
      const filteredCamps = useMemo(()=>
        objFilter.overview==="all" ? rawData.campaigns : rawData.campaigns.filter(c=>c.objetivo===objFilter.overview),
        [rawData.campaigns, objFilter.overview]);

      const filteredAds = useMemo(()=>
        objFilter.anuncios==="all" ? rawData.ads : rawData.ads.filter(a=>a.objetivo===objFilter.anuncios),
        [rawData.ads, objFilter.anuncios]);

      const filteredWorstCamps = useMemo(()=>
        objFilter.worst==="all" ? rawData.campaigns : rawData.campaigns.filter(c=>c.objetivo===objFilter.worst),
        [rawData.campaigns, objFilter.worst]);

      const filteredSets = useMemo(()=>
        objFilter.advplus==="all" ? rawData.adSets : rawData.adSets.filter(a=>a.objetivo===objFilter.advplus),
        [rawData.adSets, objFilter.advplus]);

      const setFilter = (tab, val) => setObjFilter(f=>({...f,[tab]:val}));

      // Stats
      const totalGasto = filteredCamps.reduce((a,c)=>a+c.gasto,0);
      const totalLeads = filteredCamps.reduce((a,c)=>a+c.leads,0);
      const avgCPL = totalLeads>0 ? Math.round(totalGasto/totalLeads) : 0;
      const campsWithLeads = filteredCamps.filter(c=>c.leads>0);
      const bestCPL = campsWithLeads.length ? [...campsWithLeads].sort((a,b)=>a.cpl-b.cpl)[0] : null;
      const worstCPL = campsWithLeads.length ? [...campsWithLeads].sort((a,b)=>b.cpl-a.cpl)[0] : null;
      const criticalCamps = campsWithLeads.filter(c=>c.cpl>avgCPL*2).slice(0,8);

      const topAds   = [...filteredAds].filter(a=>a.leads>0).sort((a,b)=>a.cpl-b.cpl).slice(0,6);
      const worstAds = [...filteredAds].filter(a=>a.leads>0).sort((a,b)=>b.cpl-a.cpl).slice(0,5);
      const setsWithLeads = filteredSets.filter(a=>a.leads>0).sort((a,b)=>b.alcance-a.alcance);

      const allLoaded = fileStatus.camps==="ok"||fileStatus.adsets==="ok"||fileStatus.ads==="ok";

      // Build rich data context for Claude
      const buildContext = () => {
        const camps = rawData.campaigns;
        const sets = rawData.adSets;
        const adsList = rawData.ads;
        if (camps.length === 0 && sets.length === 0 && adsList.length === 0) return null;

        const totalGastoCtx = camps.reduce((a,c)=>a+c.gasto,0);
        const totalLeadsCtx = camps.reduce((a,c)=>a+c.leads,0);
        const avgCPLCtx = totalLeadsCtx > 0 ? Math.round(totalGastoCtx/totalLeadsCtx) : 0;
        const campsWithLeads = camps.filter(c=>c.leads>0).sort((a,b)=>a.cpl-b.cpl);
        const bestCamp = campsWithLeads[0];
        const worstCamp = campsWithLeads[campsWithLeads.length-1];
        const criticals = campsWithLeads.filter(c=>c.cpl>avgCPLCtx*2);
        const wastedBudget = criticals.reduce((a,c)=>a+c.gasto,0);

        // Budget concentration
        const sortedBySpend = [...camps].sort((a,b)=>b.gasto-a.gasto);
        const top3Spend = sortedBySpend.slice(0,3).reduce((a,c)=>a+c.gasto,0);
        const top3Pct = totalGastoCtx > 0 ? Math.round((top3Spend/totalGastoCtx)*100) : 0;

        // Frequency analysis
        const highFreq = camps.filter(c=>c.frecuencia>3.5);
        const lowReach = camps.filter(c=>c.alcance>0&&c.alcance<15000);

        // Objective breakdown
        const byObj = {};
        camps.forEach(c=>{
          if(!byObj[c.objetivo]) byObj[c.objetivo]={camps:0,leads:0,gasto:0};
          byObj[c.objetivo].camps++;
          byObj[c.objetivo].leads+=c.leads;
          byObj[c.objetivo].gasto+=c.gasto;
        });

        // Ad quality patterns
        const adsWithScores = adsList.filter(a=>a.calidad&&a.calidad!=="-"&&a.leads>0);
        const funnelProblems = adsWithScores.filter(a=>/encima|above/i.test(a.calidad)&&/abajo|below/i.test(a.conversion));

        let ctx = `=== DATOS META ADS · MÁS EDUCACIÓN CONTINUA UNIACC ===

`;
        ctx += `RESUMEN EJECUTIVO:
`;
        ctx += `- Gasto total: CLP ${totalGastoCtx.toLocaleString("es-CL")}
`;
        ctx += `- Total leads/resultados: ${totalLeadsCtx}
`;
        ctx += `- CPL promedio general: $${avgCPLCtx.toLocaleString("es-CL")}
`;
        ctx += `- Mejor CPL: $${bestCamp?Math.round(bestCamp.cpl).toLocaleString("es-CL"):"N/A"} (${bestCamp?.nombre||""})
`;
        ctx += `- Peor CPL: $${worstCamp?Math.round(worstCamp.cpl).toLocaleString("es-CL"):"N/A"} (${worstCamp?.nombre||""})
`;
        ctx += `- Ratio mejor/peor CPL: ${bestCamp&&worstCamp?Math.round(worstCamp.cpl/bestCamp.cpl)+"x":"-"}
`;
        ctx += `- Campañas críticas (CPL > 2x promedio): ${criticals.length} campañas
`;
        ctx += `- Presupuesto en campañas críticas: CLP ${wastedBudget.toLocaleString("es-CL")} (${totalGastoCtx>0?Math.round((wastedBudget/totalGastoCtx)*100):0}% del total)
`;
        ctx += `- Concentración de gasto: top 3 campañas acaparan ${top3Pct}% del presupuesto
`;
        ctx += `- Campañas con frecuencia alta (>3.5x): ${highFreq.length}
`;
        ctx += `- Campañas con alcance pequeño (<15k personas): ${lowReach.length}
`;

        ctx += `
DESGLOSE POR OBJETIVO:
`;
        Object.entries(byObj).forEach(([obj,data])=>{
          const cpl = data.leads>0?Math.round(data.gasto/data.leads):0;
          ctx += `- ${obj}: ${data.camps} campañas, ${data.leads} leads, CLP ${data.gasto.toLocaleString("es-CL")} gastados, CPL promedio $${cpl.toLocaleString("es-CL")}
`;
        });

        if (camps.length > 0) {
          ctx += `
CAMPAÑAS DETALLE (ordenadas de mejor a peor CPL):
`;
          campsWithLeads.forEach((c,i) => {
            const vsAvg = avgCPLCtx>0?((c.cpl/avgCPLCtx-1)*100).toFixed(0):0;
            const vsAvgTxt = vsAvg > 0 ? `+${vsAvg}% sobre promedio` : `${vsAvg}% bajo promedio`;
            const pctGasto = totalGastoCtx>0?((c.gasto/totalGastoCtx)*100).toFixed(1):0;
            const pctLeads = totalLeadsCtx>0?((c.leads/totalLeadsCtx)*100).toFixed(1):0;
            ctx += `${i+1}. ${c.nombre}
`;
            ctx += `   CPL: $${Math.round(c.cpl).toLocaleString("es-CL")} (${vsAvgTxt})
`;
            ctx += `   Gasto: CLP ${c.gasto.toLocaleString("es-CL")} (${pctGasto}% del presupuesto total)
`;
            ctx += `   Leads: ${c.leads} (${pctLeads}% del total)
`;
            ctx += `   Alcance: ${c.alcance.toLocaleString("es-CL")} personas · Frecuencia: ${c.frecuencia.toFixed(1)}x · Objetivo: ${c.objetivo}
`;
            ctx += `   Eficiencia: ${(c.leads/Math.max(c.gasto/1000,1)).toFixed(2)} leads por mil CLP gastados
`;
          });
          // Campaigns with spend but no leads
          const noLeads = camps.filter(c=>c.gasto>0&&c.leads===0);
          if(noLeads.length>0){
            ctx += `
CAMPAÑAS SIN RESULTADOS (gasto sin leads):
`;
            noLeads.forEach(c=>{
              ctx += `- ${c.nombre}: CLP ${c.gasto.toLocaleString("es-CL")} gastados, 0 leads
`;
            });
          }

        if (sets.length > 0) {
          ctx += `
CONJUNTOS DE ANUNCIOS (top 20 por gasto):
`;

            const eff = s.gasto>0&&s.leads>0?(s.leads/(s.gasto/1000)).toFixed(2):"0";
            ctx += `- ${s.nombre}: ${s.leads} leads, CPL $${Math.round(s.cpl).toLocaleString("es-CL")}, gasto CLP ${s.gasto.toLocaleString("es-CL")}, alcance ${s.alcance.toLocaleString("es-CL")}, frec. ${s.frecuencia.toFixed(1)}x, ${eff} leads/1000 CLP
`;
          });

ANUNCIOS ESTRELLA (top 8 por CPL, mínimo 3 leads):
`;
          [...adsList].filter(a=>a.leads>=3).sort((a,b)=>a.cpl-b.cpl).slice(0,8).forEach(a => {

`;

`;

PROBLEMA POST-CLIC DETECTADO (calidad alta pero conversión baja):
`;
            funnelProblems.forEach(a=>{
              ctx += `- "${a.nombre}": calidad ${a.calidad}, conversión ${a.conversion} → el formulario no convierte
`;
            });
          }
        }

        return ctx;
